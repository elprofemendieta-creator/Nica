<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunidad - Nica Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    padding: 20px;
    color: white;
}

.container {
    max-width: 1200px;
    margin: auto;
}

.card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    border-radius: 2rem;
    padding: 1.5rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.profile-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #F57C00;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    overflow: hidden;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.stats {
    flex: 1;
}

.stats p {
    margin: 5px 0;
}

.position-badge {
    display: inline-block;
    background: rgba(245, 124, 0, 0.2);
    border: 1px solid #F57C00;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.85rem;
    margin-top: 8px;
    cursor: help;
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    padding-bottom: 10px;
}

.tab-btn {
    border: none;
    background: transparent;
    color: white;
    padding: 10px 20px;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 1rem;
}

.tab-btn.active {
    background: #F57C00;
}

.tab-pane {
    display: none;
}

.tab-pane.active {
    display: block;
}

.card h2 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    border-left: 4px solid #F57C00;
    padding-left: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.ranking-table {
    width: 100%;
    border-collapse: collapse;
}

.ranking-table th,
.ranking-table td {
    padding: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
}

.ranking-table th {
    color: #F57C00;
}

.ranking-table tr.highlight-row {
    background: rgba(245, 124, 0, 0.2);
}

.search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.search-box input,
.search-box textarea {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 40px;
    background: rgba(255, 255, 255, 0.12);
    color: white;
    outline: none;
    font-family: inherit;
}

.search-box textarea {
    border-radius: 20px;
    resize: vertical;
    min-height: 80px;
}

.btn {
    border: none;
    padding: 10px 20px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    color: white;
    background: linear-gradient(95deg, #F9A826, #F57C00);
    transition: 0.2s;
}

.btn:hover {
    transform: translateY(-2px);
}

.btn-outline {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.4);
}

.btn-danger {
    background: linear-gradient(95deg, #c62828, #b71c1c);
}

.btn-success {
    background: linear-gradient(95deg, #43a047, #2e7d32);
}

.btn-secondary {
    background: linear-gradient(95deg, #546e7a, #37474f);
}

.friend-item {
    background: rgba(255, 255, 255, 0.05);
    padding: 12px;
    border-radius: 1rem;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
}

.friend-actions {
    display: flex;
    gap: 8px;
}

.request-item {
    background: rgba(255, 255, 255, 0.08);
    border-left: 4px solid #F57C00;
}

.qr-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.foro-post {
    background: rgba(255, 255, 255, 0.08);
    padding: 15px;
    border-radius: 1rem;
    margin-bottom: 12px;
    border-left: 4px solid #F57C00;
}

.foro-post strong {
    color: #F9A826;
    display: block;
    margin-bottom: 5px;
}

.foro-post small {
    opacity: 0.7;
    display: block;
    margin-top: 8px;
    font-size: 0.7rem;
}

.foro-post-image {
    max-width: 100%;
    border-radius: 12px;
    margin: 10px 0;
    cursor: pointer;
    transition: transform 0.2s;
    max-height: 300px;
    object-fit: cover;
}

.foro-post-image:hover {
    transform: scale(1.02);
}

.image-preview {
    position: relative;
    display: inline-block;
    margin-top: 10px;
}

.image-preview img {
    max-width: 200px;
    max-height: 150px;
    border-radius: 12px;
}

.remove-image {
    position: absolute;
    top: -8px;
    right: -8px;
    background: #c62828;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
}

.delete-post-btn {
    background: #c62828 !important;
    padding: 5px 12px !important;
    font-size: 0.8rem !important;
    margin-top: 10px;
}

.badge {
    background: #F57C00;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    margin-left: 8px;
}

.empty-state {
    text-align: center;
    padding: 40px;
    opacity: 0.7;
}

.back-btn {
    position: fixed;
    left: 20px;
    bottom: 20px;
    background: rgba(0, 0, 0, 0.6);
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    gap: 8px;
    backdrop-filter: blur(8px);
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 10000;
    cursor: pointer;
    align-items: center;
    justify-content: center;
}

.modal img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
}

@media (max-width: 700px) {
    .profile-header {
        flex-direction: column;
        text-align: center;
    }
    .friend-item {
        flex-direction: column;
        align-items: flex-start;
    }
    .friend-actions {
        width: 100%;
        justify-content: flex-end;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="profile-header">
            <div class="avatar">
                <img id="userPhoto" src="" alt="Foto perfil" style="display:none;">
                <i id="defaultAvatar" class="fas fa-user"></i>
            </div>
            <div class="stats">
                <h3 id="userDisplayName">Cargando...</h3>
                <p><i class="fas fa-star"></i> Puntos: <span id="userPoints">0</span></p>
                <p id="globalPosition" class="position-badge">
                    <i class="fas fa-chart-line"></i>
                    <span id="positionText">Calculando...</span>
                </p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="ranking">🏆 Ranking</button>
            <button class="tab-btn" data-tab="amigos">👥 Amigos</button>
            <button class="tab-btn" data-tab="buscar">🔍 Buscar</button>
            <button class="tab-btn" data-tab="compartir">📲 Compartir</button>
            <button class="tab-btn" data-tab="foro">🧭 Foro</button>
        </div>

        <div id="rankingPane" class="tab-pane active">
            <h2><i class="fas fa-chart-line"></i> Ranking Global</h2>
            <table class="ranking-table">
                <thead><tr><th>#</th><th>Usuario</th><th>Puntos</th></tr></thead>
                <tbody id="rankingBody"></tbody>
            </table>
        </div>

        <div id="amigosPane" class="tab-pane">
            <h2><i class="fas fa-users"></i> Mis Amigos</h2>
            <div id="solicitudesPendientes"></div>
            <div id="amigosList"></div>
        </div>

        <div id="buscarPane" class="tab-pane">
            <h2><i class="fas fa-user-plus"></i> Buscar usuarios</h2>
            <div class="search-box">
                <input type="text" id="searchUserInput" placeholder="Buscar por nombre...">
                <button class="btn" id="searchUserBtn">Buscar</button>
            </div>
            <div id="searchResults"></div>
        </div>

        <div id="compartirPane" class="tab-pane">
            <h2><i class="fas fa-qrcode"></i> Compartir perfil</h2>
            <div class="qr-container">
                <div id="qrCode"></div>
                <button id="shareWhatsAppBtn" class="btn"><i class="fab fa-whatsapp"></i> Compartir</button>
                <button id="copyLinkBtn" class="btn btn-outline">Copiar enlace</button>
            </div>
        </div>

        <!-- FORO CON FOTOS -->
        <div id="foroPane" class="tab-pane">
            <h2><i class="fas fa-comments"></i> Muro de Consejos</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <textarea id="mensajeForo" placeholder="Escribe tu mensaje..." style="flex: 1; padding: 12px; border-radius: 20px; background: rgba(255,255,255,0.12); color: white; border: none;"></textarea>
                <input type="file" id="imagenForo" accept="image/*" style="display: none;">
                <button class="btn btn-secondary" id="btnSubirImagen"><i class="fas fa-image"></i> 📷</button>
                <button class="btn" id="publicarForoBtn"><i class="fas fa-paper-plane"></i> Publicar</button>
            </div>
            <div id="previewImagen" style="display: none; margin-bottom: 15px;">
                <div class="image-preview">
                    <img id="previewImg" src="" alt="Vista previa">
                    <div class="remove-image" id="removerImagen"><i class="fas fa-times"></i></div>
                </div>
            </div>
            <div id="foroMensajes"></div>
        </div>
    </div>
</div>

<a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Volver</a>

<div id="imageModal" class="modal"><img id="modalImage" src=""></div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"
    }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged } from "firebase/auth";
import { getFirestore, collection, query, orderBy, getDocs, where, addDoc, deleteDoc, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc } from "firebase/firestore";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "firebase/storage";

const firebaseConfig = {
    apiKey: "AIzaSyA6jVICuE17KJcO34gE1brMxqWEfNd3Fy0",
    authDomain: "mapa-41b00.firebaseapp.com",
    projectId: "mapa-41b00",
    storageBucket: "mapa-41b00.firebasestorage.app",
    messagingSenderId: "535032835400",
    appId: "1:535032835400:web:68c079cbc3f419eafd177d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
let currentUser = null;
let imagenSeleccionada = null;

// TABS
document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        const id = btn.dataset.tab;
        document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(`${id}Pane`).classList.add("active");
    });
});

function toast(msg, isError = false) {
    const div = document.createElement("div");
    div.innerText = msg;
    div.style.position = "fixed";
    div.style.bottom = "90px";
    div.style.left = "50%";
    div.style.transform = "translateX(-50%)";
    div.style.background = isError ? "#c62828" : "#2E7D32";
    div.style.padding = "12px 20px";
    div.style.borderRadius = "40px";
    div.style.zIndex = "9999";
    div.style.color = "white";
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
}

// Perfil
async function asegurarPerfilUsuario(user) {
    const userRef = doc(db, "usuarios", user.uid);
    const userDoc = await getDoc(userRef);
    if (!userDoc.exists()) {
        await setDoc(userRef, {
            uid: user.uid,
            nombre: user.displayName || user.email.split('@')[0],
            email: user.email,
            puntos: 0,
            amigos: [],
            solicitudesEnviadas: [],
            solicitudesRecibidas: []
        });
    }
}

// Ranking
async function cargarRankingGlobal() {
    const q = query(collection(db, "usuarios"), orderBy("puntos", "desc"));
    const snap = await getDocs(q);
    const body = document.getElementById("rankingBody");
    body.innerHTML = "";
    let pos = 1;
    for (const docSnap of snap.docs) {
        const data = docSnap.data();
        const isCurrentUser = (docSnap.id === currentUser.uid);
        body.innerHTML += `<tr ${isCurrentUser ? 'class="highlight-row"' : ''}>
            <td>${pos++}</td>
            <td>${data.nombre || "Usuario"} ${isCurrentUser ? '👑' : ''}</td>
            <td>${data.puntos || 0}</td>
        </tr>`;
    }
}

// FORO CON IMÁGENES
const btnImagen = document.getElementById("btnSubirImagen");
const inputImagen = document.getElementById("imagenForo");
const previewDiv = document.getElementById("previewImagen");
const previewImg = document.getElementById("previewImg");
const removerImg = document.getElementById("removerImagen");

btnImagen.addEventListener("click", () => inputImagen.click());

inputImagen.addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) {
        imagenSeleccionada = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            previewImg.src = event.target.result;
            previewDiv.style.display = "block";
        };
        reader.readAsDataURL(imagenSeleccionada);
    }
});

removerImg.addEventListener("click", () => {
    imagenSeleccionada = null;
    previewDiv.style.display = "none";
    inputImagen.value = "";
});

async function publicarConImagen() {
    const mensaje = document.getElementById("mensajeForo").value.trim();
    if (!mensaje && !imagenSeleccionada) {
        toast("Escribe un mensaje o selecciona una imagen");
        return;
    }

    try {
        let imagenURL = null;
        
        if (imagenSeleccionada) {
            const timestamp = Date.now();
            const imageRef = ref(storage, `foro/${currentUser.uid}_${timestamp}.jpg`);
            await uploadBytes(imageRef, imagenSeleccionada);
            imagenURL = await getDownloadURL(imageRef);
        }

        await addDoc(collection(db, "foro"), {
            uid: currentUser.uid,
            nombre: currentUser.displayName || currentUser.email.split('@')[0],
            mensaje: mensaje || "📸",
            imagen: imagenURL,
            fecha: Date.now()
        });

        document.getElementById("mensajeForo").value = "";
        imagenSeleccionada = null;
        previewDiv.style.display = "none";
        inputImagen.value = "";
        toast("Publicado con éxito!");
    } catch (error) {
        console.error(error);
        toast("Error al publicar", true);
    }
}

document.getElementById("publicarForoBtn").addEventListener("click", publicarConImagen);

// Cargar mensajes del foro
const qForo = query(collection(db, "foro"), orderBy("fecha", "desc"));
onSnapshot(qForo, (snapshot) => {
    const container = document.getElementById("foroMensajes");
    container.innerHTML = "";
    snapshot.forEach(async (docSnap) => {
        const data = docSnap.data();
        const post = document.createElement("div");
        post.className = "foro-post";
        
        const fecha = new Date(data.fecha).toLocaleString();
        
        let imagenHTML = "";
        if (data.imagen) {
            imagenHTML = `<img src="${data.imagen}" class="foro-post-image" onclick="verImagen('${data.imagen}')" alt="Imagen">`;
        }
        
        post.innerHTML = `
            <strong>${data.nombre}</strong>
            <p>${data.mensaje}</p>
            ${imagenHTML}
            <small>${fecha}</small>
        `;
        
        if (data.uid === currentUser.uid) {
            const btnDelete = document.createElement("button");
            btnDelete.className = "btn delete-post-btn";
            btnDelete.innerHTML = '<i class="fas fa-trash"></i> Eliminar';
            btnDelete.onclick = async () => {
                if (confirm("¿Eliminar esta publicación?")) {
                    if (data.imagen) {
                        try {
                            const imageRef = ref(storage, data.imagen);
                            await deleteObject(imageRef);
                        } catch(e) { console.log("Error al eliminar imagen"); }
                    }
                    await deleteDoc(doc(db, "foro", docSnap.id));
                    toast("Publicación eliminada");
                }
            };
            post.appendChild(btnDelete);
        }
        container.appendChild(post);
    });
});

window.verImagen = (url) => {
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImage");
    modal.style.display = "flex";
    modalImg.src = url;
};

document.getElementById("imageModal").addEventListener("click", () => {
    document.getElementById("imageModal").style.display = "none";
});

// Buscar usuarios
document.getElementById("searchUserBtn").addEventListener("click", async () => {
    const texto = document.getElementById("searchUserInput").value.trim().toLowerCase();
    if (!texto) return toast("Escribe un nombre");
    const snap = await getDocs(collection(db, "usuarios"));
    const results = document.getElementById("searchResults");
    results.innerHTML = "";
    let encontrados = 0;
    for (const docSnap of snap.docs) {
        const data = docSnap.data();
        if (data.uid === currentUser.uid) continue;
        if ((data.nombre || "").toLowerCase().includes(texto)) {
            encontrados++;
            results.innerHTML += `<div class="friend-item"><div><strong>${data.nombre}</strong><br><small>⭐ ${data.puntos || 0} pts</small></div>
            <button class="btn" onclick="enviarSolicitud('${data.uid}', '${data.nombre}')"><i class="fas fa-user-plus"></i> Enviar</button></div>`;
        }
    }
    if (encontrados === 0) results.innerHTML = "<p>No se encontraron usuarios</p>";
});

window.enviarSolicitud = async (uid, nombre) => {
    await updateDoc(doc(db, "usuarios", currentUser.uid), {
        solicitudesEnviadas: arrayUnion(uid)
    });
    await updateDoc(doc(db, "usuarios", uid), {
        solicitudesRecibidas: arrayUnion({ uid: currentUser.uid, nombre: currentUser.displayName })
    });
    toast(`Solicitud enviada a ${nombre}`);
};

// Inicialización
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "index.html";
        return;
    }
    currentUser = user;
    await asegurarPerfilUsuario(user);
    document.getElementById("userDisplayName").innerText = user.displayName || user.email.split('@')[0];
    document.getElementById("userPoints").innerText = "0";
    generarQR();
    cargarRankingGlobal();
});

function generarQR() {
    const url = `${window.location.origin}${window.location.pathname}?user=${currentUser.uid}`;
    new QRCode(document.getElementById("qrCode"), { text: url, width: 180, height: 180 });
    document.getElementById("copyLinkBtn").onclick = () => { navigator.clipboard.writeText(url); toast("Enlace copiado"); };
    document.getElementById("shareWhatsAppBtn").onclick = () => { window.open(`https://wa.me/?text=${encodeURIComponent(url)}`, "_blank"); };
}
</script>
</body>
</html>
