<iframe id="tourFrame" src="tours/diriamba/index.html"></iframe>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      // REEMPLAZA CON TUS DATOS
     const firebaseConfig = {
      apiKey: "AIzaSyA6jVICuE17KJcO34gE1brMxqWEfNd3Fy0",
      authDomain: "mapa-41b00.firebaseapp.com",
      projectId: "mapa-41b00",
      storageBucket: "mapa-41b00.firebasestorage.app",
      messagingSenderId: "535032835400",
      appId: "1:535032835400:web:68c079cbc3f419eafd177d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Autenticación anónima
    signInAnonymously(auth).catch(console.error);

    let uid = null;
    onAuthStateChanged(auth, (user) => {
      if (user) uid = user.uid;
    });

    // Función que actualiza Firestore al recibir un token
    async function registrarToken(tokenCampo) {
      if (!uid) return;
      const lugarRef = doc(db, "users", uid, "explorer", "parque_diriamba");

      try {
        await runTransaction(db, async (transaction) => {
          const lugarSnap = await transaction.get(lugarRef);
          let data = { token1: false, token2: false, progress: 0, badge: false };
          if (lugarSnap.exists()) data = lugarSnap.data();

          // Si el token ya estaba encontrado, no hacer nada
          if (data[tokenCampo]) return;

          data[tokenCampo] = true;
          const tokens = [data.token1, data.token2].filter(Boolean).length;
          data.progress = tokens * 50;
          data.badge = data.progress === 100;
          if (data.badge) {
            data.completedAt = new Date().toISOString();
            // Opcional: mostrar mensaje de insignia
            alert('🎉 ¡Felicidades! Has obtenido la insignia de Parque de Diriamba.');
          }

          transaction.set(lugarRef, data, { merge: true });
        });
        mostrarNotificacion(`¡Has encontrado ${tokenCampo}!`);
      } catch (e) {
        console.error("Error al guardar token:", e);
      }
    }

    function mostrarNotificacion(mensaje) {
      // Puedes usar una librería de toast o un div temporal
      const div = document.createElement('div');
      div.textContent = mensaje;
      div.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#FFB703; color:black; padding:10px 20px; border-radius:30px; font-weight:bold; z-index:999;';
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2500);
    }

    // Escuchar mensajes del iframe
    window.addEventListener('message', (event) => {
      if (event.data.type === 'TOKEN_ENCONTRADO') {
        if (event.data.token === 'token1') registrarToken('token1');
        if (event.data.token === 'token2') registrarToken('token2');
      }
    });
  </script>
