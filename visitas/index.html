<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitas Pinolera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0b3d91, #1e90ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .hero {
      background: url('https://images.unsplash.com/photo-1598971861713-54f6b3a6a2e8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') center/cover no-repeat;
      width: 100%;
      max-width: 900px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0,0,0,0.5);
      position: relative;
      display: flex;
      flex-direction: column;
      color: white;
    }
    .hero-overlay {
      background: rgba(0, 20, 50, 0.7);
      backdrop-filter: blur(15px);
      padding: 40px 30px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }
    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 40px;
      max-width: 600px;
      line-height: 1.5;
    }
    .progress-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 30px 25px;
      width: 100%;
      max-width: 500px;
      border: 1px solid rgba(255,255,255,0.3);
      margin-bottom: 30px;
      animation: fadeInUp 0.8s ease;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 25px;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-icon {
      font-size: 2rem;
      margin-bottom: 5px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
    }
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.8;
    }
    .progress-bar {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      height: 16px;
      overflow: hidden;
      margin: 10px 0 5px;
    }
    .progress-fill {
      background: linear-gradient(90deg, #FFD700, #FFA500);
      height: 100%;
      border-radius: 20px;
      width: 0%;
      transition: width 0.5s ease;
    }
    .progress-text {
      text-align: right;
      font-size: 0.9rem;
      font-weight: bold;
    }
    .buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }
    .btn {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 14px 28px;
      border-radius: 40px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover {
      background: rgba(255,255,255,0.35);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .btn-primary {
      background: #FFB703;
      border-color: #FFB703;
      color: #023047;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .subtitle { font-size: 1rem; }
      .hero-overlay { padding: 25px 15px; }
      .stats { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-overlay">
      <h1>🇳🇮 Visitas Pinolera</h1>
      <p class="subtitle">
        Explora virtualmente los lugares más emblemáticos de Nicaragua, descubre secretos ocultos y colecciona insignias únicas.
      </p>

      <div class="progress-card">
        <div class="stats">
          <div class="stat-item">
            <span class="stat-icon">🏆</span>
            <span class="stat-value" id="badgeCount">0</span>
            <span class="stat-label">Insignias</span>
          </div>
          <div class="stat-item">
            <span class="stat-icon">📍</span>
            <span class="stat-value" id="placesCompleted">0/1</span>
            <span class="stat-label">Lugares visitados</span>
          </div>
          <div class="stat-item">
            <span class="stat-icon">📈</span>
            <span class="stat-value" id="overallProgress">0%</span>
            <span class="stat-label">Avance general</span>
          </div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressLabel">0% completado</p>
      </div>

      <div class="buttons">
        <a href="insignias.html" class="btn btn-primary">🏅 Libreta de Insignias</a>
        <a href="estadisticas.html" class="btn">📊 Estadísticas</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ⚠️ REEMPLAZA con tu configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSy...",
      authDomain: "tupoyecto.firebaseapp.com",
      projectId: "tupoyecto",
      storageBucket: "tupoyecto.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abc..."
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Autenticación anónima automática
    signInAnonymously(auth).catch(console.error);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        const lugarRef = doc(db, "users", user.uid, "explorer", "parque_diriamba");
        onSnapshot(lugarRef, (docSnap) => {
          let data = { token1: false, token2: false, progress: 0, badge: false };
          if (docSnap.exists()) data = docSnap.data();

          const badgeCount = data.badge ? 1 : 0;
          const completed = data.badge ? 1 : 0;
          const progress = data.progress || 0;

          document.getElementById("badgeCount").textContent = badgeCount;
          document.getElementById("placesCompleted").textContent = `${completed}/1`;
          document.getElementById("overallProgress").textContent = `${progress}%`;
          document.getElementById("progressFill").style.width = `${progress}%`;
          document.getElementById("progressLabel").textContent = `${progress}% completado`;
        });
      }
    });
  </script>
</body>
</html>
