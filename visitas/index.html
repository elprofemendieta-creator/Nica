<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🇳🇮 Visitas Pinolera - Guía Turística</title>
  
  <!-- Font Awesome para íconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ============================================================
       VISITAS PINOLERA - Guía Turística de Nicaragua
       Paleta: #232049, #a4c737, #a287be, #fbfbfb
       Fuentes: Myriad Pro, Cascadia Mono Light
       ============================================================ */

    /* ===== CARGA DE FUENTES ===== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    @font-face {
      font-family: 'Myriad Pro';
      src: local('Myriad Pro'), local('MyriadPro-Regular');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Myriad Pro';
      src: local('Myriad Pro Bold'), local('MyriadPro-Bold');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Cascadia Mono Light';
      src: local('Cascadia Mono Light'), local('CascadiaMono-Light');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    /* ===== VARIABLES ===== */
    :root {
      --primary: #a4c737;
      --primary-dark: #8ab32e;
      --primary-light: #c0e05a;
      --secondary: #a287be;
      --secondary-dark: #8a73a8;
      --bg-dark: #232049;
      --bg-light: #fbfbfb;
      --text-light: #fbfbfb;
      --text-dark: #232049;
      --text-muted: rgba(251, 251, 251, 0.7);
      --text-muted-dark: rgba(35, 32, 73, 0.6);
      
      --font-title: 'Myriad Pro', 'Poppins', 'Segoe UI', sans-serif;
      --font-body: 'Myriad Pro', 'Inter', 'Segoe UI', sans-serif;
      --font-mono: 'Cascadia Mono Light', 'Cascadia Mono', monospace;
      
      --shadow-card: 0 30px 50px rgba(0, 0, 0, 0.5);
      --shadow-primary: 0 4px 15px rgba(164, 199, 55, 0.4);
      --shadow-secondary: 0 4px 15px rgba(162, 135, 190, 0.4);
      
      --transition-fast: 0.2s ease;
      --transition-med: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      --transition-slow: 0.6s ease;
      
      --border-radius-lg: 32px;
      --border-radius-md: 24px;
      --border-radius-sm: 16px;
    }

    /* ===== RESET Y BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, #0b1a3a, var(--bg-dark));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Decoración de fondo */
    body::before {
      content: "🇳🇮";
      position: fixed;
      top: -50px;
      right: -50px;
      font-size: 300px;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
      transform: rotate(15deg);
    }

    body::after {
      content: "🌋";
      position: fixed;
      bottom: -30px;
      left: -30px;
      font-size: 250px;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
      transform: rotate(-10deg);
    }

    /* Partículas flotantes */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.1;
      animation: floatParticle 15s infinite linear;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.1; }
      90% { opacity: 0.1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ===== HERO PRINCIPAL ===== */
    .hero {
      background: url('https://images.unsplash.com/photo-1598971861713-54f6b3a6a2e8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') center/cover no-repeat;
      width: 100%;
      max-width: 950px;
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      position: relative;
      display: flex;
      flex-direction: column;
      color: var(--text-light);
      z-index: 1;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .hero-overlay {
      background: rgba(35, 32, 73, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 45px 35px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    /* Borde decorativo superior */
    .hero-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
      background-size: 200% 100%;
      animation: gradientMove 3s ease-in-out infinite;
    }

    @keyframes gradientMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ===== TÍTULOS ===== */
    h1 {
      font-family: var(--font-title);
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--primary));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientShift 4s ease-in-out infinite;
      text-shadow: none;
      position: relative;
    }

    h1::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 4px;
      animation: linePulse 2s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes linePulse {
      0%, 100% { width: 60px; opacity: 1; }
      50% { width: 100px; opacity: 0.6; }
    }

    .subtitle {
      font-family: var(--font-body);
      font-size: 1.15rem;
      opacity: 0.9;
      margin: 16px 0 35px 0;
      max-width: 600px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .subtitle i {
      color: var(--primary);
      margin: 0 4px;
    }

    /* ===== TARJETA DE PROGRESO ===== */
    .progress-card {
      background: rgba(251, 251, 251, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--border-radius-md);
      padding: 30px 28px;
      width: 100%;
      max-width: 520px;
      border: 1px solid rgba(164, 199, 55, 0.2);
      margin-bottom: 30px;
      animation: fadeInUp 0.8s ease 0.2s both;
      transition: all var(--transition-med);
      position: relative;
      overflow: hidden;
    }

    .progress-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(164, 199, 55, 0.05) 0%, transparent 70%);
      animation: rotateGlow 30s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .progress-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    /* ===== ESTADÍSTICAS ===== */
    .stats {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 25px;
      position: relative;
      z-index: 1;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 12px 18px;
      border-radius: var(--border-radius-sm);
      min-width: 90px;
      transition: all var(--transition-fast);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-item:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
      border-color: rgba(164, 199, 55, 0.2);
    }

    .stat-icon {
      font-size: 2rem;
      margin-bottom: 4px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
    }

    .stat-label {
      font-family: var(--font-body);
      font-size: 0.8rem;
      opacity: 0.7;
      color: var(--text-light);
      letter-spacing: 0.5px;
    }

    /* ===== BARRA DE PROGRESO ===== */
    .progress-bar {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      height: 20px;
      overflow: hidden;
      margin: 8px 0 6px;
      position: relative;
      z-index: 1;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .progress-fill {
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
      background-size: 200% 100%;
      height: 100%;
      border-radius: 20px;
      width: 0%;
      transition: width 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      animation: progressGradient 2s ease-in-out infinite;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      animation: shimmer 2s ease-in-out infinite;
    }

    @keyframes progressGradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .progress-text {
      font-family: var(--font-mono);
      text-align: right;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
      letter-spacing: 0.5px;
    }

    /* ===== BOTONES ===== */
    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 6px;
      position: relative;
      z-index: 1;
    }

    .btn {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-light);
      padding: 14px 32px;
      border-radius: 50px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.6s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(164, 199, 55, 0.3);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-color: var(--primary);
      color: var(--bg-dark);
      font-weight: 700;
      box-shadow: var(--shadow-primary);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      box-shadow: 0 8px 25px rgba(164, 199, 55, 0.5);
      border-color: var(--primary-light);
      color: var(--bg-dark);
    }

    .btn-secondary {
      border-color: var(--secondary);
    }

    .btn-secondary:hover {
      border-color: var(--secondary);
      box-shadow: var(--shadow-secondary);
      background: rgba(162, 135, 190, 0.15);
    }

    .btn i {
      font-size: 1.1rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .hero-overlay {
        padding: 30px 20px;
      }

      h1 {
        font-size: 2.2rem;
      }

      .subtitle {
        font-size: 1rem;
        margin-bottom: 25px;
      }

      .progress-card {
        padding: 20px 16px;
      }

      .stats {
        gap: 12px;
      }

      .stat-item {
        padding: 8px 12px;
        min-width: 70px;
      }

      .stat-value {
        font-size: 1.6rem;
      }

      .stat-icon {
        font-size: 1.6rem;
      }

      .btn {
        padding: 12px 24px;
        font-size: 0.9rem;
        min-height: 46px;
      }

      .buttons {
        gap: 12px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .hero {
        border-radius: var(--border-radius-md);
      }

      .hero-overlay {
        padding: 24px 14px;
      }

      h1 {
        font-size: 1.8rem;
      }

      h1::after {
        width: 40px;
      }

      .subtitle {
        font-size: 0.9rem;
        margin-bottom: 20px;
      }

      .progress-card {
        padding: 16px 12px;
        border-radius: var(--border-radius-sm);
      }

      .stats {
        flex-direction: row;
        gap: 8px;
        justify-content: space-around;
      }

      .stat-item {
        padding: 6px 10px;
        min-width: 60px;
      }

      .stat-value {
        font-size: 1.3rem;
      }

      .stat-label {
        font-size: 0.7rem;
      }

      .stat-icon {
        font-size: 1.3rem;
      }

      .progress-bar {
        height: 14px;
      }

      .progress-text {
        font-size: 0.75rem;
      }

      .btn {
        padding: 10px 18px;
        font-size: 0.85rem;
        min-height: 40px;
        gap: 6px;
      }

      .buttons {
        gap: 8px;
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        justify-content: center;
      }
    }

    /* Orientación horizontal en móvil */
    @media (max-height: 600px) and (orientation: landscape) {
      .hero-overlay {
        padding: 16px 20px;
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 2px;
      }

      .subtitle {
        font-size: 0.85rem;
        margin-bottom: 12px;
      }

      .progress-card {
        padding: 14px 16px;
        margin-bottom: 12px;
      }

      .stats {
        margin-bottom: 12px;
        gap: 8px;
      }

      .stat-item {
        padding: 4px 10px;
      }

      .stat-value {
        font-size: 1.2rem;
      }

      .stat-icon {
        font-size: 1.2rem;
        margin-bottom: 0;
      }

      .buttons {
        gap: 8px;
      }

      .btn {
        padding: 8px 16px;
        font-size: 0.8rem;
        min-height: 34px;
      }
    }

    /* ===== UTILIDADES ===== */
    .text-center { text-align: center; }
    .text-primary { color: var(--primary); }
    .text-secondary { color: var(--secondary); }
    .text-muted { color: var(--text-muted); }

    .d-flex { display: flex; }
    .flex-column { flex-direction: column; }
    .align-center { align-items: center; }
    .justify-center { justify-content: center; }
    .gap-1 { gap: 4px; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 16px; }
    .gap-4 { gap: 24px; }

    .w-100 { width: 100%; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 16px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 16px; }

    .rounded { border-radius: var(--border-radius-md); }
    .rounded-full { border-radius: 50px; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--secondary);
    }

    /* ===== SELECTION ===== */
    ::selection {
      background: var(--primary);
      color: var(--bg-dark);
    }

    /* ===== ANIMACIÓN DE CARGA ===== */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .loading {
      animation: pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <!-- Partículas de fondo -->
  <div class="particles" id="particles"></div>

  <!-- HERO PRINCIPAL -->
  <div class="hero">
    <div class="hero-overlay">
      <h1>🇳🇮 Visitas Pinolera</h1>
      <p class="subtitle">
        <i class="fas fa-map-pin"></i> Explora virtualmente los lugares más emblemáticos de Nicaragua,
        descubre secretos ocultos <i class="fas fa-star"></i> y colecciona insignias únicas.
      </p>

      <!-- Tarjeta de Progreso -->
      <div class="progress-card">
        <div class="stats">
          <div class="stat-item">
            <span class="stat-icon">🏆</span>
            <span class="stat-value" id="badgeCount">0</span>
            <span class="stat-label">Insignias</span>
          </div>
          <div class="stat-item">
            <span class="stat-icon">📍</span>
            <span class="stat-value" id="placesCompleted">0/1</span>
            <span class="stat-label">Lugares visitados</span>
          </div>
          <div class="stat-item">
            <span class="stat-icon">📈</span>
            <span class="stat-value" id="overallProgress">0%</span>
            <span class="stat-label">Avance general</span>
          </div>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
        <p class="progress-text" id="progressLabel">0% completado</p>
      </div>

      <!-- Botones -->
      <div class="buttons">
        <a href="insignias.html" class="btn btn-primary">
          <i class="fas fa-award"></i> Libreta de Insignias
        </a>
        <a href="estadisticas.html" class="btn btn-secondary">
          <i class="fas fa-chart-bar"></i> Estadísticas
        </a>
      </div>
    </div>
  </div>

  <!-- ============================================================
       FIREBASE - CONFIGURACIÓN Y LÓGICA
       ============================================================ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ⚠️ REEMPLAZA con tu configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSy...",
      authDomain: "tupoyecto.firebaseapp.com",
      projectId: "tupoyecto",
      storageBucket: "tupoyecto.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abc..."
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Autenticación anónima automática
    signInAnonymously(auth).catch(console.error);

    // Escuchar cambios de autenticación
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Referencia al documento del explorador
        const lugarRef = doc(db, "users", user.uid, "explorer", "parque_diriamba");
        
        // Escuchar cambios en tiempo real
        onSnapshot(lugarRef, (docSnap) => {
          let data = { 
            token1: false, 
            token2: false, 
            progress: 0, 
            badge: false 
          };
          
          if (docSnap.exists()) {
            data = docSnap.data();
          }

          // Calcular estadísticas
          const badgeCount = data.badge ? 1 : 0;
          const completed = data.badge ? 1 : 0;
          const progress = data.progress || 0;

          // Actualizar UI
          document.getElementById("badgeCount").textContent = badgeCount;
          document.getElementById("placesCompleted").textContent = `${completed}/1`;
          document.getElementById("overallProgress").textContent = `${progress}%`;
          
          // Actualizar barra de progreso
          const progressFill = document.getElementById("progressFill");
          progressFill.style.width = `${progress}%`;
          document.getElementById("progressLabel").textContent = `${progress}% completado`;

          // Efecto visual cuando se completa
          if (progress === 100) {
            progressFill.style.background = "linear-gradient(90deg, #FFD700, #FFA500, #FFD700)";
            document.getElementById("progressLabel").style.color = "#FFD700";
          } else {
            progressFill.style.background = "";
            document.getElementById("progressLabel").style.color = "";
          }
        }, (error) => {
          console.error("Error al escuchar datos:", error);
        });
      }
    });

    // ===== GENERAR PARTÍCULAS =====
    function createParticles() {
      const container = document.getElementById('particles');
      const count = 30;
      
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.animationDelay = `${Math.random() * 15}s`;
        particle.style.animationDuration = `${10 + Math.random() * 20}s`;
        particle.style.width = `${2 + Math.random() * 4}px`;
        particle.style.height = particle.style.width;
        particle.style.background = Math.random() > 0.5 ? 'var(--primary)' : 'var(--secondary)';
        particle.style.opacity = 0.05 + Math.random() * 0.1;
        container.appendChild(particle);
      }
    }

    // Inicializar partículas
    createParticles();

    console.log('🇳🇮 Visitas Pinolera - ¡Bienvenido, explorador!');
  </script>
</body>
</html>
