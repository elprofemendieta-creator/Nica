<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libreta de Insignias – Visitas Pinolera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0b2b5e, #3a6ea5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(25px);
      border-radius: 36px;
      padding: 30px 20px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
    }
    h1 {
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .subtitle {
      text-align: center;
      opacity: 0.8;
      margin-bottom: 35px;
    }
    .album {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }
    .badge-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 20px;
      width: 260px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.25);
      transition: all 0.4s ease;
      animation: fadeInUp 0.6s ease;
    }
    .badge-card.completed {
      border-color: #FFD700;
      box-shadow: 0 0 25px rgba(255,215,0,0.5);
    }
    .badge-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 15px;
    }
    .badge-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .badge-status {
      font-size: 1rem;
      margin: 10px 0;
      font-weight: 600;
    }
    .progress-mini {
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      height: 10px;
      margin: 12px 0;
      overflow: hidden;
    }
    .progress-mini-fill {
      background: linear-gradient(90deg, #FFD700, #FFA500);
      height: 100%;
      width: 0%;
      border-radius: 12px;
      transition: width 0.5s;
    }
    .btn-visit {
      background: #FFB703;
      color: #023047;
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 10px;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-visit:hover {
      background: #FFA000;
      transform: scale(1.05);
    }
    .lock-icon {
      font-size: 2.5rem;
      display: block;
      margin: 5px 0;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      .badge-card { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏆 Libreta de Insignias</h1>
    <p class="subtitle">Colecciona recuerdos de tus aventuras virtuales</p>

    <div class="album">
      <!-- Tarjeta Parque Diriamba -->
      <div class="badge-card" id="diriambaCard">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Parque_Central_Diriamba.jpg/640px-Parque_Central_Diriamba.jpg" alt="Parque Diriamba">
        <h3 class="badge-name">Parque Central de Diriamba</h3>
        <span class="badge-status" id="statusText">🔒 No obtenida</span>
        <div class="progress-mini">
          <div class="progress-mini-fill" id="diriambaProgressFill"></div>
        </div>
        <p style="font-size:0.9rem;" id="progressLabel">0%</p>
        <a href="visita-parque-diriamba.html" class="btn-visit" id="visitBtn">🔍 Iniciar Visita</a>
      </div>
      <!-- Tarjeta Parque Diriamba -->
      <div class="badge-card" id="diriambaCard">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Parque_Central_Diriamba.jpg/640px-Parque_Central_Diriamba.jpg" alt="Parque Diriamba">
        <h3 class="badge-name">Reloj publico</h3>
        <span class="badge-status" id="statusText">🔒 No obtenida</span>
        <div class="progress-mini">
          <div class="progress-mini-fill" id="diriambaProgressFill"></div>
        </div>
        <p style="font-size:0.9rem;" id="progressLabel">0%</p>
        <a href="visita-parque-diriamba.html" class="btn-visit" id="visitBtn">🔍 Iniciar Visita</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA6jVICuE17KJcO34gE1brMxqWEfNd3Fy0",
      authDomain: "mapa-41b00.firebaseapp.com",
      projectId: "mapa-41b00",
      storageBucket: "mapa-41b00.firebasestorage.app",
      messagingSenderId: "535032835400",
      appId: "1:535032835400:web:68c079cbc3f419eafd177d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    signInAnonymously(auth).catch(console.error);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        const lugarRef = doc(db, "users", user.uid, "explorer", "parque_diriamba");
        onSnapshot(lugarRef, (docSnap) => {
          let data = { token1: false, token2: false, progress: 0, badge: false };
          if (docSnap.exists()) data = docSnap.data();

          const card = document.getElementById("diriambaCard");
          const statusText = document.getElementById("statusText");
          const progressFill = document.getElementById("diriambaProgressFill");
          const progressLabel = document.getElementById("progressLabel");

          progressFill.style.width = `${data.progress}%`;
          progressLabel.textContent = `${data.progress}%`;

          if (data.badge) {
            card.classList.add("completed");
            statusText.innerHTML = "🏅 Completada";
          } else if (data.progress > 0) {
            statusText.innerHTML = "🔍 En progreso";
          } else {
            statusText.innerHTML = "🔒 No obtenida";
          }
        });
      }
    });
  </script>
</body>
</html>
