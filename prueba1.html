<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Guía Pinolero - Descubre Nicaragua</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0a2a1f 0%, #1a4a2a 50%, #0d331f 100%);
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: "🌋🌿🦎🌊🌴🍃";
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      font-size: 80px;
      opacity: 0.04;
      pointer-events: none;
      white-space: pre;
      text-align: center;
      letter-spacing: 20px;
      z-index: 0;
    }
    
    .container {
      position: relative;
      z-index: 2;
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.25);
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    
    .mascota img {
      width: 90px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    h1 {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #FFE259, #FFA751);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
    }
    
    .input-group {
      margin-bottom: 1rem;
    }
    
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 50px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 0.95rem;
      outline: none;
    }
    
    .input-group input:focus {
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.3);
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 0.95rem;
      margin-bottom: 12px;
      border: none;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #F9A826, #F57C00);
      color: white;
    }
    
    .btn-outline {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.5);
      color: white;
    }
    
    .btn-edit {
      background: rgba(255, 193, 7, 0.2);
      border: 1.5px solid #FFD54F;
      color: #FFD54F;
      width: auto;
      padding: 8px 20px;
    }
    
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: rgba(255,255,255,0.5);
      margin: 1.2rem 0;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    
    .link {
      text-align: center;
      margin-top: 12px;
    }
    
    .link a {
      color: #FFD54F;
      text-decoration: none;
    }
    
    /* Menú principal */
    .menu-section {
      display: none;
      width: 100%;
      animation: fadeInUp 0.6s ease;
    }
    
    .menu-section h2 {
      color: white;
      text-align: center;
      margin-bottom: 1rem;
      font-size: 1.8rem;
    }
    
    .menu-section h2 span {
      background: linear-gradient(135deg, #FFE259, #FFA751);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    /* Perfil compacto */
    .profile-header {
      background: rgba(255,255,255,0.08);
      border-radius: 1.5rem;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .profile-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .profile-avatar {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #FFD54F;
    }
    
    .profile-name {
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
    }
    
    /* Modal de edición */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }
    
    .modal-content {
      background: linear-gradient(145deg, #0a2a1f, #1a4a2a);
      border-radius: 2rem;
      padding: 2rem;
      width: 90%;
      max-width: 450px;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-content h3 {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    
    .profile-pic-edit {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
      position: relative;
    }
    
    .profile-pic-edit img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #FFD54F;
      cursor: pointer;
    }
    
    .camera-icon {
      position: absolute;
      bottom: 5px;
      right: calc(50% - 60px);
      background: #F9A826;
      border-radius: 50%;
      padding: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    .avatar-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 1rem 0;
    }
    
    .avatar-pred {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      object-fit: cover;
    }
    
    .avatar-pred.selected {
      border-color: #FFD54F;
      transform: scale(1.05);
    }
    
    /* Menú de botones */
    .menu-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .menu-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      backdrop-filter: blur(12px);
      border-radius: 1.8rem;
      padding: 1.8rem 1rem;
      width: 190px;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.15);
    }
    
    .menu-card:hover {
      transform: translateY(-10px);
      border-color: rgba(255, 193, 7, 0.5);
    }
    
    .menu-card span {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.8rem;
    }
    
    .menu-card h3 {
      font-size: 0.85rem;
      font-weight: 600;
    }
    
    .toast-message {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      z-index: 1000;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    
    .whatsapp-container {
      position: fixed;
      bottom: 25px;
      right: 25px;
      z-index: 1000;
    }
    
    .whatsapp-float {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      text-decoration: none;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); }
      70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @media (max-width: 680px) {
      .menu-card { width: 155px; }
      .profile-header { flex-direction: column; text-align: center; }
      .profile-info { flex-direction: column; }
      .toast-message { white-space: normal; text-align: center; max-width: 85%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login -->
    <div id="authCard" class="glass-card">
      <div class="mascota">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="Mascota" />
      </div>
      <h1>Guía Pinolero</h1>
      <p class="subtitle">🌋 Explora Nicaragua jugando 🌊</p>
      
      <div id="loginForm">
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="📧 Correo electrónico" />
        </div>
        <div class="input-group">
          <input type="password" id="loginPassword" placeholder="🔒 Contraseña" />
        </div>
        <button id="doLoginBtn" class="btn btn-primary">Iniciar sesión</button>
        <div class="link">
          <a href="#" id="forgotPasswordLink">¿Olvidaste tu contraseña?</a>
        </div>
        <div class="divider"><span>o</span></div>
        <button id="showRegisterBtn" class="btn btn-outline">✨ Crear cuenta nueva</button>
      </div>
      
      <div id="registerForm" style="display:none;">
        <div class="input-group">
          <input type="text" id="regName" placeholder="👤 Nombre completo" />
        </div>
        <div class="input-group">
          <input type="email" id="regEmail" placeholder="📧 Correo electrónico" />
        </div>
        <div class="input-group">
          <input type="password" id="regPassword" placeholder="🔒 Contraseña (mínimo 6 caracteres)" />
        </div>
        <button id="doRegisterBtn" class="btn btn-primary">Registrarse</button>
        <button id="backToLoginBtn" class="btn btn-outline">← Volver</button>
      </div>
    </div>
    
    <!-- Menú principal -->
    <div id="menuSection" class="menu-section">
      <h2>¡Bienvenido, <span id="userName"></span>!</h2>
      
      <div class="profile-header">
        <div class="profile-info">
          <img id="profileAvatar" class="profile-avatar" src="" alt="Avatar" />
          <div class="profile-name" id="profileNameDisplay"></div>
        </div>
        <button id="editProfileBtn" class="btn-edit">
          <i class="fas fa-pen"></i> Editar perfil
        </button>
      </div>
      
      <div class="menu-buttons">
        <a href="../juegos/juegos.html" class="menu-card">
          <span>🎮</span><h3>Juegos Turísticos</h3>
        </a>
        <a href="mapa.html" class="menu-card">
          <span>🗺️</span><h3>Mapa Interactivo</h3>
        </a>
        <a href="../lugares/lugares.html" class="menu-card">
          <span>🧭</span><h3>Lugares</h3>
        </a>
        <a href="comunidad.html" class="menu-card">
          <span>👩🏾‍🤝‍🧑🏻</span><h3>Comunidad</h3>
        </a>
        <a href="https://nicaguia.base44.app" class="menu-card">
          <span>🔍</span><h3>Escanea y aprende</h3>
        </a>
        <a href="temporal.html" class="menu-card">
          <span>🏬🛒</span><h3>Promociones</h3>
        </a>
      </div>
      
      <button id="logoutBtn" class="btn btn-outline" style="width:auto; margin:0 auto; display:block;">
        Cerrar sesión
      </button>
    </div>
  </div>

  <!-- Modal Editar Perfil -->
  <div id="editProfileModal" class="modal">
    <div class="modal-content">
      <h3><i class="fas fa-user-edit"></i> Editar perfil</h3>
      
      <div class="profile-pic-edit">
        <img id="modalProfileImage" src="" alt="Foto" />
        <div class="camera-icon" id="uploadPhotoIcon">
          <i class="fas fa-camera"></i>
        </div>
      </div>
      <input type="file" id="uploadPhoto" accept="image/*" style="display: none;" />
      
      <div class="input-group">
        <label style="color:white;">Nombre completo:</label>
        <input type="text" id="editNameInput" placeholder="Tu nombre" />
      </div>
      
      <label style="color:white;">O elige una foto predeterminada:</label>
      <div class="avatar-grid" id="avatarGrid"></div>
      
      <button id="saveProfileBtn" class="btn btn-primary">Guardar cambios</button>
      <button id="closeModalBtn" class="btn btn-outline">Cancelar</button>
    </div>
  </div>

  <!-- WhatsApp -->
  <div class="whatsapp-container">
    <a href="#" class="whatsapp-float" id="whatsappBtn">
      <i class="fab fa-whatsapp"></i>
    </a>
  </div>

  <div id="toast" class="toast-message" style="display: none;"></div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail, updateProfile } from "firebase/auth";
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyA6jVICuE17KJcO34gE1brMxqWEfNd3Fy0",
      authDomain: "mapa-41b00.firebaseapp.com",
      projectId: "mapa-41b00",
      storageBucket: "mapa-41b00.firebasestorage.app",
      messagingSenderId: "535032835400",
      appId: "1:535032835400:web:68c079cbc3f419eafd177d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Elementos
    const authCard = document.getElementById('authCard');
    const menuSection = document.getElementById('menuSection');
    const userNameSpan = document.getElementById('userName');
    const profileNameDisplay = document.getElementById('profileNameDisplay');
    const profileAvatar = document.getElementById('profileAvatar');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const toastDiv = document.getElementById('toast');
    const editModal = document.getElementById('editProfileModal');
    const modalProfileImage = document.getElementById('modalProfileImage');
    const editNameInput = document.getElementById('editNameInput');
    const avatarGrid = document.getElementById('avatarGrid');
    const uploadPhoto = document.getElementById('uploadPhoto');

    const DEFAULT_AVATARS = [
      "https://randomuser.me/api/portraits/women/68.jpg",
      "https://randomuser.me/api/portraits/men/32.jpg",
      "https://randomuser.me/api/portraits/women/45.jpg",
      "https://randomuser.me/api/portraits/men/75.jpg",
      "https://randomuser.me/api/portraits/lego/1.jpg",
      "https://randomuser.me/api/portraits/lego/2.jpg",
      "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
      "https://cdn-icons-png.flaticon.com/512/3135/3135768.png"
    ];
    const FALLBACK = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

    function showToast(msg, isError = false) {
      toastDiv.textContent = msg;
      toastDiv.style.display = 'block';
      toastDiv.style.background = isError ? 'rgba(220,53,69,0.95)' : 'rgba(0,0,0,0.85)';
      setTimeout(() => toastDiv.style.display = 'none', 3000);
    }

    async function guardarEnFirestore(user, extra = {}) {
      const ref = doc(db, 'usuarios', user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          uid: user.uid,
          email: user.email,
          nombre: extra.nombre || user.displayName || user.email.split('@')[0],
          fotoURL: extra.fotoURL || user.photoURL || DEFAULT_AVATARS[0],
          fechaRegistro: new Date()
        });
      }
    }

    async function cargarPerfil(user) {
      if (!user) return;
      const ref = doc(db, 'usuarios', user.uid);
      const snap = await getDoc(ref);
      let nombre, fotoURL;
      
      if (snap.exists()) {
        const data = snap.data();
        nombre = data.nombre || user.displayName || user.email.split('@')[0];
        fotoURL = data.fotoURL || user.photoURL || FALLBACK;
      } else {
        nombre = user.displayName || user.email.split('@')[0];
        fotoURL = user.photoURL || FALLBACK;
        await guardarEnFirestore(user, { nombre, fotoURL });
      }
      
      userNameSpan.textContent = nombre;
      profileNameDisplay.textContent = nombre;
      profileAvatar.src = fotoURL;
      profileAvatar.onerror = () => profileAvatar.src = FALLBACK;
    }

    function renderAvatars(selected) {
      avatarGrid.innerHTML = '';
      DEFAULT_AVATARS.forEach(url => {
        const img = document.createElement('img');
        img.src = url;
        img.className = 'avatar-pred';
        if (selected === url) img.classList.add('selected');
        img.onclick = () => {
          document.querySelectorAll('.avatar-pred').forEach(a => a.classList.remove('selected'));
          img.classList.add('selected');
          modalProfileImage.src = url;
        };
        avatarGrid.appendChild(img);
      });
    }

    async function guardarPerfil(nuevoNombre, nuevaFoto) {
      const user = auth.currentUser;
      if (!user) return;
      
      if (nuevoNombre && nuevoNombre !== user.displayName) {
        await updateProfile(user, { displayName: nuevoNombre });
      }
      
      const ref = doc(db, 'usuarios', user.uid);
      const updates = {};
      if (nuevoNombre) updates.nombre = nuevoNombre;
      if (nuevaFoto) updates.fotoURL = nuevaFoto;
      await updateDoc(ref, updates);
      
      userNameSpan.textContent = nuevoNombre || user.displayName;
      profileNameDisplay.textContent = nuevoNombre || user.displayName;
      if (nuevaFoto) profileAvatar.src = nuevaFoto;
      
      showToast('✅ Perfil actualizado');
      editModal.style.display = 'none';
    }

    // ========== Login y Registro ==========
    document.getElementById('doLoginBtn').onclick = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      if (!email || !pass) return showToast('Completa los campos', true);
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        showToast('✅ Bienvenido');
      } catch (err) {
        showToast('Credenciales incorrectas', true);
      }
    };

    document.getElementById('doRegisterBtn').onclick = async () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value;
      if (!name || !email || !pass) return showToast('Completa los campos', true);
      if (pass.length < 6) return showToast('Contraseña mínimo 6 caracteres', true);
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        await guardarEnFirestore(cred.user, { nombre: name, fotoURL: DEFAULT_AVATARS[0] });
        showToast('✅ Registro exitoso');
      } catch (err) {
        showToast(err.message.includes('email') ? 'Correo ya registrado' : 'Error', true);
      }
    };

    document.getElementById('forgotPasswordLink').onclick = async () => {
      const email = prompt('Ingresa tu correo para restablecer contraseña:');
      if (email && email.includes('@')) {
        try {
          await sendPasswordResetEmail(auth, email);
          showToast('📨 Revisa tu correo (incluso SPAM)');
        } catch (err) {
          showToast(err.message.includes('user-not-found') ? 'Correo no registrado' : 'Error', true);
        }
      }
    };

    // Mostrar/ocultar formularios
    document.getElementById('showRegisterBtn').onclick = () => {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
    };
    document.getElementById('backToLoginBtn').onclick = () => {
      registerForm.style.display = 'none';
      loginForm.style.display = 'block';
    };
    document.getElementById('logoutBtn').onclick = async () => {
      await signOut(auth);
      showToast('👋 Sesión cerrada');
    };

    // ========== PERFIL con subida de foto FUNCIONANDO ==========
    let fotoTemporal = null;

    document.getElementById('editProfileBtn').onclick = async () => {
      const user = auth.currentUser;
      if (!user) return;
      const ref = doc(db, 'usuarios', user.uid);
      const snap = await getDoc(ref);
      const data = snap.exists() ? snap.data() : { nombre: user.displayName, fotoURL: user.photoURL };
      
      editNameInput.value = data.nombre || '';
      const fotoActual = data.fotoURL || FALLBACK;
      modalProfileImage.src = fotoActual;
      fotoTemporal = fotoActual;
      renderAvatars(fotoActual);
      editModal.style.display = 'flex';
    };

    // Subir foto desde el dispositivo
    document.getElementById('uploadPhotoIcon').onclick = () => uploadPhoto.click();
    
    uploadPhoto.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) return showToast('Selecciona una imagen', true);
      if (file.size > 5 * 1024 * 1024) return showToast('Máximo 5MB', true);
      
      const reader = new FileReader();
      reader.onload = (ev) => {
        fotoTemporal = ev.target.result;
        modalProfileImage.src = fotoTemporal;
        // Remover selección de avatares predeterminados
        document.querySelectorAll('.avatar-pred').forEach(a => a.classList.remove('selected'));
        showToast('Foto cargada, guarda los cambios');
      };
      reader.readAsDataURL(file);
    };

    document.getElementById('saveProfileBtn').onclick = async () => {
      const nuevoNombre = editNameInput.value.trim();
      if (!nuevoNombre) return showToast('El nombre no puede estar vacío', true);
      await guardarPerfil(nuevoNombre, fotoTemporal);
    };

    document.getElementById('closeModalBtn').onclick = () => {
      editModal.style.display = 'none';
    };

    window.onclick = (e) => {
      if (e.target === editModal) editModal.style.display = 'none';
    };

    // ========== WhatsApp ==========
    document.getElementById('whatsappBtn').onclick = (e) => {
      e.preventDefault();
      const user = auth.currentUser;
      let msg = "¡Hola!%20Estoy%20explorando%20Nicaragua%20con%20Guía%20Pinolero";
      if (user?.displayName) msg = `Hola,%20soy%20${encodeURIComponent(user.displayName)}.%20${msg}`;
      window.open(`https://wa.me/50588170531?text=${msg}`, '_blank');
    };

    // Estado de autenticación
    onAuthStateChanged(auth, (user) => {
      if (user) {
        authCard.style.display = 'none';
        menuSection.style.display = 'block';
        cargarPerfil(user);
      } else {
        authCard.style.display = 'block';
        menuSection.style.display = 'none';
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
      }
    });
  </script>
</body>
</html>
