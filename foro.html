<script type="module">

import { initializeApp } from "firebase/app";

import {
  getAuth,
  onAuthStateChanged
} from "firebase/auth";

import {
  getFirestore,
  collection,
  query,
  orderBy,
  limit,
  getDocs,
  where,
  addDoc,
  deleteDoc,
  doc
} from "firebase/firestore";

const firebaseConfig = {
  apiKey: "AIzaSyA6jVICuE17KJcO34gE1brMxqWEfNd3Fy0",
  authDomain: "mapa-41b00.firebaseapp.com",
  projectId: "mapa-41b00",
  storageBucket: "mapa-41b00.firebasestorage.app",
  messagingSenderId: "535032835400",
  appId: "1:535032835400:web:68c079cbc3f419eafd177d",
  measurementId: "G-7R3DSH7PPN"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentUserData = null;

function mostrarToast(msg, error=false) {

  const toast = document.createElement("div");

  toast.textContent = msg;

  toast.style.position = "fixed";
  toast.style.bottom = "80px";
  toast.style.left = "50%";
  toast.style.transform = "translateX(-50%)";
  toast.style.background = error ? "#d32f2f" : "#2E7D32";
  toast.style.color = "white";
  toast.style.padding = "10px 20px";
  toast.style.borderRadius = "40px";
  toast.style.zIndex = "9999";

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 3000);
}

function initTabs() {

  const tabs = document.querySelectorAll(".tab-btn");
  const panes = document.querySelectorAll(".tab-pane");

  tabs.forEach(btn => {

    btn.addEventListener("click", () => {

      tabs.forEach(b => b.classList.remove("active"));
      panes.forEach(p => p.classList.remove("active"));

      btn.classList.add("active");

      const tabId = btn.dataset.tab;

      document.getElementById(`${tabId}Pane`).classList.add("active");

      if (tabId === "foro") {
        cargarForo();
      }

    });
  });
}

async function publicarEnForo() {

  const mensaje = document.getElementById("foroMensaje").value.trim();

  const imagenInput = document.getElementById("foroImagen");

  if (!mensaje && !imagenInput.files[0]) {
    mostrarToast("Escribe algo o agrega una imagen", true);
    return;
  }

  let imagenBase64 = "";

  if (imagenInput.files[0]) {

    imagenBase64 = await new Promise((resolve) => {

      const reader = new FileReader();

      reader.onload = () => resolve(reader.result);

      reader.readAsDataURL(imagenInput.files[0]);

    });

  }

  await addDoc(collection(db, "foro"), {

    uid: currentUser.uid,
    nombre: currentUserData.nombre,
    fotoURL: currentUser.photoURL || "",
    mensaje,
    imagen: imagenBase64,
    fecha: new Date()

  });

  document.getElementById("foroMensaje").value = "";
  document.getElementById("foroImagen").value = "";

  mostrarToast("Publicado correctamente");

  cargarForo();
}

async function cargarForo() {

  const container = document.getElementById("foroPosts");

  container.innerHTML = "<p style='color:white;'>Cargando publicaciones...</p>";

  const q = query(collection(db, "foro"), orderBy("fecha", "desc"));

  const snap = await getDocs(q);

  container.innerHTML = "";

  if (snap.empty) {
    container.innerHTML = "<p style='color:white;'>No hay publicaciones todavía.</p>";
    return;
  }

  snap.forEach(docSnap => {

    const data = docSnap.data();

    const div = document.createElement("div");

    div.className = "card";

    div.innerHTML = `

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:15px;">

        <img
          src="${data.fotoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
          style="
            width:55px;
            height:55px;
            border-radius:50%;
            object-fit:cover;
          "
        >

        <div>
          <strong>${data.nombre}</strong><br>
          <small>${new Date(data.fecha.seconds * 1000).toLocaleString()}</small>
        </div>

      </div>

      ${
        data.mensaje
        ? `<p style="margin-bottom:15px;white-space:pre-wrap;">${data.mensaje}</p>`
        : ""
      }

      ${
        data.imagen
        ? `
          <img
            src="${data.imagen}"
            style="
              width:100%;
              border-radius:20px;
              margin-top:10px;
            "
          >
        `
        : ""
      }

      ${
        data.uid === currentUser.uid
        ? `
          <button
            class="btn delete-post-btn"
            data-id="${docSnap.id}"
            style="margin-top:15px;background:#d32f2f;"
          >
            <i class="fas fa-trash"></i>
            Borrar
          </button>
        `
        : ""
      }

    `;

    container.appendChild(div);

  });

  document.querySelectorAll(".delete-post-btn").forEach(btn => {

    btn.addEventListener("click", async () => {

      await deleteDoc(doc(db, "foro", btn.dataset.id));

      mostrarToast("Publicación eliminada");

      cargarForo();

    });

  });
}

document.getElementById("publicarForoBtn").addEventListener("click", publicarEnForo);

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  currentUserData = {
    nombre: user.displayName || user.email,
    puntos: 0
  };

  document.getElementById("userDisplayName").innerText = currentUserData.nombre;

  document.getElementById("userPoints").innerText = currentUserData.puntos;

  if (user.photoURL) {

    document.getElementById("avatarContainer").innerHTML = `
      <img src="${user.photoURL}">
    `;
  }

  initTabs();

});

</script>

</body>
</html>
