}

.stats{

}

.tab-btn{

}

.tab-btn.active{
background:#F57C00;
}

.tab-pane{

}

}

/* FORO */

.foro-post{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:1rem;
margin-bottom:12px;
border-left:4px solid #F57C00;
}

.foro-post strong{
color:#F9A826;
}

.delete-btn{
background:#c62828;
padding:5px 12px;
font-size:0.8rem;
}

@media(max-width:700px){

.profile-header{
flex-direction:column;
text-align:center;
}

.stats{
text-align:center;
}

.friend-item{

}

}

</style>

"imports":{

"firebase/auth":"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
"firebase/firestore":"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
}

</script>

<script type="module">

import { initializeApp } from "firebase/app";

import {
getAuth,
onAuthStateChanged
} from "firebase/auth";

import {
getFirestore,
collection,
query,
orderBy,
limit,
getDocs,
where,
doc,
addDoc,
deleteDoc,
onSnapshot
} from "firebase/firestore";

const firebaseConfig = {

apiKey:"AIzaSyA6jVICuE17KJcO34gE1brMxqWEfNd3Fy0",

authDomain:"mapa-41b00.firebaseapp.com",

projectId:"mapa-41b00",

storageBucket:"mapa-41b00.firebasestorage.app",

messagingSenderId:"535032835400",

appId:"1:535032835400:web:68c079cbc3f419eafd177d",

measurementId:"G-7R3DSH7PPN"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser = null;

// TABS

const tabs = document.querySelectorAll(".tab-btn");

const panes = document.querySelectorAll(".tab-pane");

tabs.forEach(btn=>{

btn.addEventListener("click",()=>{

const id = btn.dataset.tab;

tabs.forEach(t=>t.classList.remove("active"));

panes.forEach(p=>p.classList.remove("active"));

btn.classList.add("active");

document
.getElementById(`${id}Pane`)
.classList.add("active");

});

});

// TOAST

function mostrarToast(msg){

const toast = document.createElement("div");

toast.innerText = msg;

toast.style.position = "fixed";
toast.style.bottom = "80px";
toast.style.left = "50%";
toast.style.transform = "translateX(-50%)";
toast.style.background = "#2E7D32";
toast.style.padding = "10px 20px";
toast.style.borderRadius = "40px";
toast.style.color = "white";
toast.style.zIndex = "9999";

document.body.appendChild(toast);

setTimeout(()=>{
toast.remove();
},3000);

}

// PERFIL

async function cargarPerfil(user){

document.getElementById(
"userDisplayName"
).innerText =
user.displayName || user.email;

const avatarBox =
document.getElementById("avatarBox");

if(user.photoURL){

avatarBox.innerHTML = `
<img src="${user.photoURL}">
`;

}

const q = query(
collection(db,"usuarios"),
where("uid","==",user.uid)
);

const snap = await getDocs(q);

if(!snap.empty){

const data =
snap.docs[0].data();

document.getElementById(
"userPoints"
).innerText =
data.puntos || 0;

}

}

// RANKING

async function cargarRanking(){

const q = query(
collection(db,"usuarios"),
orderBy("puntos","desc"),
limit(10)
);

const snap = await getDocs(q);

const body =
document.getElementById("rankingBody");

body.innerHTML = "";

let pos = 1;

snap.forEach((docSnap)=>{

const data = docSnap.data();

body.innerHTML += `
<tr>
<td>${pos++}</td>
<td>${data.nombre || data.email}</td>
<td>${data.puntos || 0}</td>
</tr>
`;

});

}

// AMIGOS

async function cargarAmigos(){

const q = query(
collection(db,"amigos"),
where("usuarioId","==",currentUser.uid)
);

const snap = await getDocs(q);

const cont =
document.getElementById("amigosList");

cont.innerHTML = "";

if(snap.empty){

cont.innerHTML =
"<p>No sigues a nadie aún.</p>";

return;

}

snap.forEach((docSnap)=>{

const data = docSnap.data();

const div =
document.createElement("div");

div.className = "friend-item";

div.innerHTML = `

<div>

<strong>
${data.nombre || "Usuario"}
</strong>

</div>

<button
class="btn delete-btn">
Dejar de seguir
</button>

`;

cont.appendChild(div);

const btn =
div.querySelector(".delete-btn");

btn.onclick = async()=>{

await deleteDoc(
doc(db,"amigos",docSnap.id)
);

mostrarToast("Amigo eliminado");

cargarAmigos();

};

});

}

// BUSCAR

async function buscarUsuarios(){

const texto =
document
.getElementById("searchUserInput")
.value
.trim()
.toLowerCase();

const cont =
document.getElementById("searchResults");

cont.innerHTML = "";

if(!texto) return;

const snap =
await getDocs(
collection(db,"usuarios")
);

snap.forEach((docSnap)=>{

const data = docSnap.data();

if(data.uid === currentUser.uid)
return;

const nombre =
(data.nombre || "")
.toLowerCase();

const email =
(data.email || "")
.toLowerCase();

if(
nombre.includes(texto)
||
email.includes(texto)
){

const div =
document.createElement("div");

div.className = "friend-item";

div.innerHTML = `

<div>

<strong>
${data.nombre}
</strong>

<br>

<small>
${data.email}
</small>

</div>

<button
class="btn seguirBtn">
Seguir
</button>

`;

cont.appendChild(div);

const seguirBtn =
div.querySelector(".seguirBtn");

seguirBtn.onclick = async()=>{

await addDoc(
collection(db,"amigos"),
{

usuarioId: currentUser.uid,

amigoId: data.uid,

nombre: data.nombre,

email: data.email

}
);

mostrarToast("Ahora sigues a este usuario");

cargarAmigos();

};

}

});

}

document
.getElementById("searchUserBtn")
.addEventListener(
"click",
buscarUsuarios
);

// FORO

async function publicarMensaje(){

const input =
document.getElementById("mensajeForo");

const texto =
input.value.trim();

if(!texto) return;

await addDoc(
collection(db,"foro"),
{

usuario:
currentUser.displayName
|| currentUser.email,

uid: currentUser.uid,

mensaje:texto,

fecha:new Date()

}
);

input.value = "";

mostrarToast("Publicado");

}

document
.getElementById("publicarForoBtn")
.addEventListener(
"click",
publicarMensaje
);

function cargarForo(){

const q = query(
collection(db,"foro"),
orderBy("fecha","desc")
);

onSnapshot(q,(snapshot)=>{

const cont =
document.getElementById("foroMensajes");

cont.innerHTML = "";

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

const div =
document.createElement("div");

div.className = "foro-post";

div.innerHTML = `

<div style="
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
">

<strong>
${data.usuario}
</strong>

${
data.uid === currentUser.uid
? `
<button
class="btn delete-btn">
Eliminar
</button>
`
: ""
}

</div>

<p style="margin-top:10px;">
${data.mensaje}
</p>

`;

cont.appendChild(div);

const deleteBtn =
div.querySelector(".delete-btn");

if(deleteBtn){

deleteBtn.onclick = async()=>{

await deleteDoc(
doc(db,"foro",docSnap.id)
);

mostrarToast("Comentario eliminado");

};

}

});

});

}

// LOGIN

onAuthStateChanged(auth,async(user)=>{

if(!user){

window.location.href =
"index.html";

return;

}

currentUser = user;

await cargarPerfil(user);

await cargarRanking();

await cargarAmigos();

cargarForo();

});

</script>

</body>
</html>
