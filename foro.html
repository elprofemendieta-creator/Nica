<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comunidad - Nica Explorer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
padding:20px;
color:white;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-radius:2rem;
padding:1.5rem;
border:1px solid rgba(255,255,255,0.2);
}

.profile-header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:#F57C00;
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
overflow:hidden;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.stats{
flex:1;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
border-bottom:1px solid rgba(255,255,255,0.2);
padding-bottom:10px;
}

.tab-btn{
border:none;
background:transparent;
color:white;
padding:10px 20px;
border-radius:40px;
cursor:pointer;
transition:0.2s;
font-size:1rem;
}

.tab-btn.active{
background:#F57C00;
}

.tab-pane{
display:none;
}

.tab-pane.active{
display:block;
}

.card h2{
font-size:1.5rem;
margin-bottom:20px;
border-left:4px solid #F57C00;
padding-left:12px;
display:flex;
align-items:center;
gap:10px;
}

.ranking-table{
width:100%;
border-collapse:collapse;
}

.ranking-table th,
.ranking-table td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.15);
}

.ranking-table th{
color:#F57C00;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-box input{
flex:1;
padding:12px;
border:none;
border-radius:40px;
background:rgba(255,255,255,0.12);
color:white;
outline:none;
}

.search-box input::placeholder{
color:rgba(255,255,255,0.6);
}

.btn{
border:none;
padding:10px 20px;
border-radius:40px;
cursor:pointer;
font-weight:600;
color:white;
background:linear-gradient(95deg,#F9A826,#F57C00);
transition:0.2s;
}

.btn:hover{
transform:translateY(-2px);
}

.btn-outline{
background:transparent;
border:1px solid rgba(255,255,255,0.4);
}

.friend-item{
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:1rem;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
}

.qr-container{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.foro-post{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:1rem;
margin-bottom:12px;
border-left:4px solid #F57C00;
}

.foro-post strong{
color:#F9A826;
}

.delete-post-btn{
background:#c62828 !important;
padding:5px 12px !important;
font-size:0.8rem !important;
}

.back-btn{
position:fixed;
left:20px;
bottom:20px;
background:rgba(0,0,0,0.6);
color:white;
text-decoration:none;
padding:10px 20px;
border-radius:50px;
display:flex;
align-items:center;
gap:8px;
backdrop-filter:blur(8px);
}

.whatsapp-float{
position:fixed;
right:20px;
bottom:20px;
width:55px;
height:55px;
border-radius:50%;
background:#25D366;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:28px;
text-decoration:none;
}

.user-badge{
background:#2E7D32;
padding:5px 10px;
border-radius:20px;
font-size:0.8rem;
}

@media(max-width:700px){

.profile-header{
flex-direction:column;
text-align:center;
}

.search-box{
flex-direction:column;
}

.friend-item{
flex-direction:column;
align-items:flex-start;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="profile-header">

<div class="avatar" id="avatarBox">
<i class="fas fa-user"></i>
</div>

<div class="stats">

<h3 id="userDisplayName">
Cargando...
</h3>

<p>
<i class="fas fa-star"></i>
Puntos:
<span id="userPoints">0</span>
</p>

<p>
<i class="fas fa-trophy"></i>
Posición global:
<span id="userRank">-</span>
</p>

</div>
</div>

<div class="tabs">

<button class="tab-btn active"
data-tab="ranking">
🏆 Ranking
</button>

<button class="tab-btn"
data-tab="amigos">
👥 Amigos
</button>

<button class="tab-btn"
data-tab="buscar">
🔍 Buscar
</button>

<button class="tab-btn"
data-tab="compartir">
📲 Compartir
</button>

<button class="tab-btn"
data-tab="foro">
🧭 Foro
</button>

</div>

<!-- RANKING -->

<div id="rankingPane"
class="tab-pane active">

<h2>
<i class="fas fa-chart-line"></i>
Top 10 Usuarios
</h2>

<table class="ranking-table">

<thead>
<tr>
<th>#</th>
<th>Usuario</th>
<th>Puntos</th>
</tr>
</thead>

<tbody id="rankingBody"></tbody>

</table>

</div>

<!-- AMIGOS -->

<div id="amigosPane"
class="tab-pane">

<h2>
<i class="fas fa-users"></i>
Mis Amigos
</h2>

<div id="amigosList"></div>

</div>

<!-- BUSCAR -->

<div id="buscarPane"
class="tab-pane">

<h2>
<i class="fas fa-user-plus"></i>
Agregar amigo
</h2>

<div class="search-box">

<input
type="text"
id="searchUserInput"
placeholder="Buscar por nombre o email...">

<button
id="searchUserBtn"
class="btn">
Buscar
</button>

</div>

<div id="searchResults"></div>

</div>

<!-- COMPARTIR -->

<div id="compartirPane"
class="tab-pane">

<h2>
<i class="fas fa-qrcode"></i>
Compartir perfil
</h2>

<div class="qr-container">

<div id="qrCode"></div>

<button
id="shareWhatsAppBtn"
class="btn">
<i class="fab fa-whatsapp"></i>
Compartir
</button>

<button
id="copyLinkBtn"
class="btn btn-outline">
Copiar enlace
</button>

</div>

</div>

<!-- FORO -->

<div id="foroPane"
class="tab-pane">

<h2>
<i class="fas fa-comments"></i>
Muro de Consejos
</h2>

<div class="search-box">

<input
type="text"
id="mensajeForo"
placeholder="Pregunta sobre buses, seguridad o consejos...">

<button
class="btn"
id="publicarForoBtn">
Publicar
</button>

</div>

<div id="foroMensajes"></div>

</div>

</div>

</div>

<a href="index.html"
class="back-btn">

<i class="fas fa-arrow-left"></i>

Volver

</a>

<script type="importmap">
{
"imports": {
"firebase/app":
"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",

"firebase/auth":
"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",

"firebase/firestore":
"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
}
}
</script>

<script type="module">

import {
initializeApp
} from "firebase/app";

import {
getAuth,
onAuthStateChanged
} from "firebase/auth";

import {
getFirestore,
collection,
query,
orderBy,
limit,
getDocs,
where,
addDoc,
deleteDoc,
doc,
onSnapshot
} from "firebase/firestore";

const firebaseConfig = {

apiKey: "TU_API_KEY",

authDomain: "TU_AUTH_DOMAIN",

projectId: "TU_PROJECT_ID",

storageBucket: "TU_STORAGE_BUCKET",

messagingSenderId: "TU_MESSAGING_ID",

appId: "TU_APP_ID"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser = null;

// TABS

const tabs = document.querySelectorAll(".tab-btn");

const panes = document.querySelectorAll(".tab-pane");

tabs.forEach(btn=>{

btn.addEventListener("click",()=>{

const id = btn.dataset.tab;

tabs.forEach(t=>t.classList.remove("active"));

panes.forEach(p=>p.classList.remove("active"));

btn.classList.add("active");

document
.getElementById(`${id}Pane`)
.classList.add("active");

});

});

// TOAST

function toast(msg){

const div = document.createElement("div");

div.innerText = msg;

div.style.position = "fixed";
div.style.bottom = "90px";
div.style.left = "50%";
div.style.transform = "translateX(-50%)";
div.style.background = "#2E7D32";
div.style.padding = "12px 20px";
div.style.borderRadius = "40px";
div.style.zIndex = "9999";

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},3000);

}

// PERFIL

async function cargarPerfil(user){

document.getElementById(
"userDisplayName"
).innerText =
user.displayName || user.email;

if(user.photoURL){

document.getElementById(
"avatarBox"
).innerHTML =
`<img src="${user.photoURL}">`;

}

const q = query(
collection(db,"usuarios"),
where("uid","==",user.uid)
);

const snap = await getDocs(q);

if(!snap.empty){

const data =
snap.docs[0].data();

document.getElementById(
"userPoints"
).innerText =
data.puntos || 0;

}

}

// QR

function generarQR(){

const qrDiv =
document.getElementById("qrCode");

qrDiv.innerHTML = "";

const url =
`${window.location.origin}${window.location.pathname}?user=${currentUser.uid}`;

new QRCode(qrDiv,{
text:url,
width:180,
height:180
});

document
.getElementById("copyLinkBtn")
.onclick = ()=>{

navigator.clipboard.writeText(url);

toast("Enlace copiado");

};

document
.getElementById("shareWhatsAppBtn")
.onclick = ()=>{

window.open(
`https://wa.me/?text=${encodeURIComponent(url)}`,
"_blank"
);

};

}

// RANKING

async function cargarRanking(){

const usersRef =
collection(db,"usuarios");

const q = query(
usersRef,
orderBy("puntos","desc"),
limit(10)
);

const snap = await getDocs(q);

const body =
document.getElementById("rankingBody");

body.innerHTML = "";

let pos = 1;

snap.forEach((docSnap)=>{

const data = docSnap.data();

body.innerHTML += `
<tr>
<td>${pos++}</td>
<td>${data.nombre || data.email}</td>
<td>${data.puntos || 0}</td>
</tr>
`;

});

if(currentUser){

const allUsers =
await getDocs(
query(usersRef,
orderBy("puntos","desc"))
);

let rank = 1;

for(const docSnap of allUsers.docs){

if(
docSnap.data().uid
===
currentUser.uid
){
break;
}

rank++;

}

document.getElementById(
"userRank"
).innerText = rank;

}

}

// AMIGOS

async function cargarAmigos(){

if(!currentUser) return;

const amigosRef =
collection(db,"amigos");

const q = query(
amigosRef,
where("usuarioId","==",currentUser.uid)
);

const snap = await getDocs(q);

const amigosIds =
snap.docs.map(
d => d.data().amigoId
);

const container =
document.getElementById("amigosList");

if(amigosIds.length === 0){

container.innerHTML =
"<p>No sigues a nadie aún.</p>";

return;

}

const usersRef =
collection(db,"usuarios");

const amigosData = [];

for(const uid of amigosIds){

const qUser = query(
usersRef,
where("uid","==",uid)
);

const userSnap =
await getDocs(qUser);

if(!userSnap.empty){

amigosData.push({

id:userSnap.docs[0].id,

data:userSnap.docs[0].data()

});

}

}

container.innerHTML = "";

amigosData.forEach((amigo)=>{

const div =
document.createElement("div");

div.className = "friend-item";

div.innerHTML = `

<div>

<strong>
${amigo.data.nombre || amigo.data.email}
</strong>

<br>

<small>
${amigo.data.puntos || 0} pts
</small>

</div>

<button
class="btn-outline btn unfollow-btn"
data-uid="${amigo.data.uid}">
Dejar de seguir
</button>

`;

container.appendChild(div);

});

document
.querySelectorAll(".unfollow-btn")
.forEach((btn)=>{

btn.addEventListener(
"click",
async()=>{

const amigoUid =
btn.dataset.uid;

const qDel = query(
amigosRef,
where("usuarioId","==",currentUser.uid),
where("amigoId","==",amigoUid)
);

const snapDel =
await getDocs(qDel);

snapDel.forEach(
async(docSnap)=>{

await deleteDoc(docSnap.ref);

}
);

toast("Amigo eliminado");

cargarAmigos();

}
);

});

}

// BUSCAR USUARIOS

async function buscarUsuarios(){

const termino =
document
.getElementById("searchUserInput")
.value
.trim();

const container =
document.getElementById("searchResults");

if(!termino){

container.innerHTML = "";

return;

}

const usersRef =
collection(db,"usuarios");

const qNombre = query(
usersRef,
where("nombre",">=",termino),
where("nombre","<=",termino + '\uf8ff')
);

const qEmail = query(
usersRef,
where("email",">=",termino),
where("email","<=",termino + '\uf8ff')
);

const [
snapNombre,
snapEmail
] = await Promise.all([
getDocs(qNombre),
getDocs(qEmail)
]);

const resultados =
new Map();

snapNombre.forEach((docSnap)=>{

if(
docSnap.data().uid
!== currentUser.uid
){

resultados.set(
docSnap.id,
docSnap.data()
);

}

});

snapEmail.forEach((docSnap)=>{

if(
docSnap.data().uid
!== currentUser.uid
){

resultados.set(
docSnap.id,
docSnap.data()
);

}

});

container.innerHTML = "";

if(resultados.size === 0){

container.innerHTML =
"<p>No se encontraron usuarios.</p>";

return;

}

for(const [id,data] of resultados){

const amigosRef =
collection(db,"amigos");

const qAmigo = query(
amigosRef,
where("usuarioId","==",currentUser.uid),
where("amigoId","==",data.uid)
);

const amigoSnap =
await getDocs(qAmigo);

const yaAmigo =
!amigoSnap.empty;

const div =
document.createElement("div");

div.className = "friend-item";

div.innerHTML = `

<div>

<strong>
${data.nombre || data.email}
</strong>

<br>

${data.puntos || 0} pts

</div>

${
!yaAmigo
? `
<button
class="btn add-friend-btn"
data-uid="${data.uid}">
Seguir
</button>
`
: `
<span class="user-badge">
✓ Amigo
</span>
`
}

`;

container.appendChild(div);

}

document
.querySelectorAll(".add-friend-btn")
.forEach((btn)=>{

btn.addEventListener(
"click",
async()=>{

const amigoUid =
btn.dataset.uid;

await addDoc(
collection(db,"amigos"),
{
usuarioId:currentUser.uid,
amigoId:amigoUid,
fecha:new Date()
}
);

toast(
"Ahora sigues a este usuario"
);

buscarUsuarios();

cargarAmigos();

}
);

});

}

document
.getElementById("searchUserBtn")
.addEventListener(
"click",
buscarUsuarios
);

// FORO

async function publicarMensaje(){

const input =
document.getElementById("mensajeForo");

const texto =
input.value.trim();

if(!texto) return;

await addDoc(
collection(db,"foro"),
{

usuario:
currentUser.displayName
|| currentUser.email,

uid: currentUser.uid,

mensaje:texto,

fecha:new Date()

}
);

input.value = "";

toast("Publicado");

}

document
.getElementById("publicarForoBtn")
.addEventListener(
"click",
publicarMensaje
);

function cargarForo(){

const q = query(
collection(db,"foro"),
orderBy("fecha","desc")
);

onSnapshot(q,(snapshot)=>{

const cont =
document.getElementById("foroMensajes");

cont.innerHTML = "";

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

const div =
document.createElement("div");

div.className = "foro-post";

div.innerHTML = `

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">

<strong>
${data.usuario}
</strong>

${
data.uid === currentUser.uid
? `
<button
class="btn delete-post-btn">
Eliminar
</button>
`
: ""
}

</div>

<p style="margin-top:10px;">
${data.mensaje}
</p>

`;

cont.appendChild(div);

const deleteBtn =
div.querySelector(".delete-post-btn");

if(deleteBtn){

deleteBtn.onclick =
async()=>{

await deleteDoc(
doc(db,"foro",docSnap.id)
);

toast(
"Comentario eliminado"
);

};

}

});

});

}

// LOGIN

let authReady = false;

onAuthStateChanged(auth, async(user)=>{

if(authReady && !user){
return;
}

if(!user){

setTimeout(()=>{

if(!auth.currentUser){

console.log("Sin sesión");

}

},1500);

return;

}

authReady = true;

currentUser = user;

await cargarPerfil(user);

generarQR();

await cargarRanking();

await cargarAmigos();

cargarForo();

});

</script>

</body>
</html>
```
