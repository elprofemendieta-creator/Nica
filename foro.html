body{

.card{

.tab-btn{

}

.card h2{
font-size:1.5rem;

border-left:4px solid #F57C00;

display:flex;
align-items:center;
gap:10px;
}

.ranking-table{
width:100%;
border-collapse:collapse;
}

.ranking-table th,
.ranking-table td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.15);
}

.ranking-table th{

}

.search-box{
display:flex;

}

.search-box input{

border:none;
border-radius:40px;
background:rgba(255,255,255,0.12);
color:white;
outline:none;
}

.search-box input::placeholder{
color:rgba(255,255,255,0.6);
}

.btn{
border:none;
padding:10px 20px;
border-radius:40px;
cursor:pointer;
font-weight:600;
color:white;
background:linear-gradient(95deg,#F9A826,#F57C00);
transition:0.2s;
}

.btn:hover{
transform:translateY(-2px);
}

.btn-outline{
background:transparent;
border:1px solid rgba(255,255,255,0.4);
}

.friend-item{
background:rgba(255,255,255,0.05);
padding:12px;

margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
}

.qr-container{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.foro-post{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:1rem;
margin-bottom:12px;
border-left:4px solid #F57C00;
}

.foro-post strong{

}

.foro-post small{
opacity:0.7;

.delete-post-btn{

}

.back-btn{

bottom:20px;
background:rgba(0,0,0,0.6);
color:white;
text-decoration:none;
padding:10px 20px;
border-radius:50px;
display:flex;
align-items:center;
gap:8px;
backdrop-filter:blur(8px);
}

@media(max-width:700px){

.profile-header{
flex-direction:column;
text-align:center;
}

.search-box{
flex-direction:column;
}

.friend-item{
flex-direction:column;
align-items:flex-start;
}

}

</style>
</head>

<body>

<div class="avatar">

<img
id="userPhoto"
src=""
alt="Foto perfil"
style="display:none;">

<i
id="defaultAvatar"
class="fas fa-user">
</i>

<h3 id="userDisplayName">

<p>
<i class="fas fa-star"></i>

</div>

<div class="tabs">

<button class="tab-btn active" data-tab="ranking">
🏆 Ranking
</button>
  
<button class="tab-btn" data-tab="amigos">

<button class="tab-btn" data-tab="buscar">

</div>

<h2>

Ranking Global

<table class="ranking-table">

<thead>

<small>Próximamente podrás añadir amigos</small>
</div>

<script type="importmap">
{
"imports": {
"firebase/app":
"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",

"firebase/auth":
"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",

"firebase/firestore":
"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
}
}
</script>

<script type="module">

import {
initializeApp
} from "firebase/app";

import {
getAuth,
onAuthStateChanged
} from "firebase/auth";

import {
getFirestore,
collection,
query,
orderBy,
limit,
getDocs,
where,
addDoc,
deleteDoc,
doc,
onSnapshot
} from "firebase/firestore";

const firebaseConfig = {

apiKey: "AIzaSyA6jVICuE17KJcO34gE1brMxqWEfNd3Fy0",

authDomain: "mapa-41b00.firebaseapp.com",

projectId: "mapa-41b00",

storageBucket: "mapa-41b00.firebasestorage.app",

messagingSenderId: "535032835400",

appId: "1:535032835400:web:68c079cbc3f419eafd177d",

measurementId: "G-7R3DSH7PPN"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser = null;

// TABS

const tabs = document.querySelectorAll(".tab-btn");

const panes = document.querySelectorAll(".tab-pane");

tabs.forEach(btn=>{

btn.addEventListener("click",()=>{

const id = btn.dataset.tab;

tabs.forEach(t=>t.classList.remove("active"));

panes.forEach(p=>p.classList.remove("active"));

btn.classList.add("active");

document
.getElementById(`${id}Pane`)
.classList.add("active");

});

});

// TOAST

function toast(msg){

const div = document.createElement("div");

div.innerText = msg;

div.style.position = "fixed";
div.style.bottom = "90px";
div.style.left = "50%";
div.style.transform = "translateX(-50%)";
div.style.background = "#2E7D32";
div.style.padding = "12px 20px";
div.style.borderRadius = "40px";
div.style.zIndex = "9999";

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},3000);

}

// PERFIL

async function cargarPerfil(user){

document.getElementById(
"userDisplayName"
).innerText =
user.displayName || user.email;

if(user.photoURL){

const photo =
document.getElementById("userPhoto");

photo.src = user.photoURL;

photo.style.display = "block";

document.getElementById(
"defaultAvatar"
).style.display = "none";

}

const q = query(
collection(db,"usuarios"),
where("uid","==",user.uid)
);

const snap = await getDocs(q);

if(!snap.empty){

const data =
snap.docs[0].data();

document.getElementById(
"userPoints"
).innerText =
data.puntos || 0;

}

}

// QR

function generarQR(){

const qrDiv =
document.getElementById("qrCode");

qrDiv.innerHTML = "";

const url =
`${window.location.origin}${window.location.pathname}?user=${currentUser.uid}`;

new QRCode(qrDiv,{
text:url,
width:180,
height:180
});

document
.getElementById("copyLinkBtn")
.onclick = ()=>{

navigator.clipboard.writeText(url);

toast("Enlace copiado");

};

document
.getElementById("shareWhatsAppBtn")
.onclick = ()=>{

window.open(
`https://wa.me/?text=${encodeURIComponent(url)}`,
"_blank"
);

};

}

// RANKING GLOBAL

async function cargarRankingGlobal(){

const q = query(
collection(db,"usuarios"),
orderBy("puntos","desc"),
limit(50)
);

const snap = await getDocs(q);

const body =
document.getElementById("rankingBody");

body.innerHTML = "";

let pos = 1;

snap.forEach((docSnap)=>{

const data = docSnap.data();

body.innerHTML += `
<tr>
<td>${pos++}</td>
<td>${data.nombre || "Usuario"}</td>
<td>${data.puntos || 0}</td>
</tr>
`;

});

}

// FORO

const foroMensajes =
document.getElementById("foroMensajes");

const publicarForoBtn =
document.getElementById("publicarForoBtn");

publicarForoBtn.addEventListener("click", async ()=>{

const input =
document.getElementById("mensajeForo");

const mensaje = input.value.trim();

if(!mensaje){

toast("Escribe un mensaje");

return;

}

try{

await addDoc(
collection(db,"foro"),
{
uid: currentUser.uid,
nombre:
currentUser.displayName ||
currentUser.email,
mensaje: mensaje,
fecha: Date.now()
}
);

input.value = "";

toast("Mensaje publicado");

}catch(error){

console.error(error);

toast("Error al publicar");

}

});

const qForo = query(
collection(db,"foro"),
orderBy("fecha","desc")
);

onSnapshot(qForo,(snapshot)=>{

foroMensajes.innerHTML = "";

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

const post =
document.createElement("div");

post.className = "foro-post";

const fecha =
new Date(data.fecha)
.toLocaleString();

post.innerHTML = `
<strong>${data.nombre}</strong>
<p>${data.mensaje}</p>
<small>${fecha}</small>
`;

if(data.uid === currentUser.uid){

const btn =
document.createElement("button");

btn.className =
"btn delete-post-btn";

btn.innerHTML =
'<i class="fas fa-trash"></i> Eliminar';

btn.onclick = async ()=>{

if(confirm("¿Eliminar mensaje?")){

await deleteDoc(
doc(db,"foro",docSnap.id)
);

toast("Mensaje eliminado");

}

};

post.appendChild(btn);

}

foroMensajes.appendChild(post);

});

});

// BUSCAR USUARIOS

const searchBtn =
document.getElementById("searchUserBtn");

const searchInput =
document.getElementById("searchUserInput");

const searchResults =
document.getElementById("searchResults");

searchBtn.addEventListener("click", async ()=>{

const texto =
searchInput.value.trim().toLowerCase();

if(!texto){

toast("Escribe un nombre");

return;

}

searchResults.innerHTML =
"<p>Buscando usuarios...</p>";

try{

const snap = await getDocs(
collection(db,"usuarios")
);

searchResults.innerHTML = "";

let encontrados = 0;

snap.forEach((docSnap)=>{

const data = docSnap.data();

const nombre =
(data.nombre || "")
.toLowerCase();

const correo =
(data.email || "")
.toLowerCase();

if(
nombre.includes(texto) ||
correo.includes(texto)
){

encontrados++;

const div =
document.createElement("div");

div.className =
"friend-item";

div.innerHTML = `
<div>
<strong>${data.nombre || "Usuario"}</strong>
<br>
<small>${data.email || "Sin correo"}</small>
</div>

<div>
⭐ ${data.puntos || 0} pts
</div>
`;

searchResults.appendChild(div);

}

});

if(encontrados === 0){

searchResults.innerHTML =
"<p>No se encontraron usuarios</p>";

}

}catch(error){

console.error(error);

toast("Error al buscar");

}

});

// LOGIN

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"index.html";

return;

}

currentUser = user;

cargarPerfil(user);

generarQR();

cargarRankingGlobal();

});

</script>

</body>
</html>
