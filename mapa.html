<div class="map-container">
  <div id="map"></div>

  <!-- Leyenda flotante -->
  <div class="map-legend">
    <div class="legend-item"><span class="legend-marker educational"></span> Ruta Educativa</div>
    <div class="legend-item"><span class="legend-marker commercial"></span> Ruta Comercial</div>
    <div class="legend-item"><span class="legend-marker star"></span> Puntos extra</div>
  </div>

  <!-- Controles de capa y ubicación -->
  <div class="layer-control">
    <button class="layer-btn active" data-layer="calles" title="Vista callejera">
      <i class="fas fa-road"></i>
    </button>
    <button class="layer-btn" data-layer="satelite" title="Vista satelital">
      <i class="fas fa-satellite"></i>
    </button>
    <button id="geolocationBtn" class="layer-btn" title="Ir a mi ubicación">
      <i class="fas fa-location-dot"></i>
    </button>
    <span class="layer-label">Mi ubicación</span>
  </div>

  <!-- Indicador de estado del GPS (solo visible cuando está activo) -->
  <div id="gpsStatus" class="gps-status hidden">
    <i class="fas fa-satellite-dish fa-pulse"></i> GPS activo
  </div>
</div>
