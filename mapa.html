<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Guía Pinolera | Nicaragua Turismo</title>
  
  <!-- Leaflet CSS/JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/mapa.css">  
</head>
<body>
<div class="app-container">
  <header class="app-header">
    <div class="logo"><i class="fas fa-map-marked-alt"></i><h2>Guía Pinolera</h2></div>
    <div class="header-controls">
      <div id="userPointsDisplay" class="user-points" style="display:none;"><i class="fas fa-star"></i> <span id="pointsValue">0</span></div>
      <button id="gpsBtn" class="icon-btn gps-btn" style="display:none;"><i class="fas fa-satellite-dish"></i></button>
      <button id="userBtn" class="icon-btn"><i class="fas fa-user-circle"></i></button>
      <button id="darkModeBtn" class="icon-btn"><i class="fas fa-moon"></i></button>
      <button id="adminLoginBtn" class="admin-login-btn"><i class="fas fa-user-shield"></i> Admin</button>
      <div id="adminPanelHeader" class="admin-panel-header hidden" style="display:none;"><span><i class="fas fa-crown"></i> Admin</span><button id="logoutAdminBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button></div>
    </div>
  </header>
  <div class="tabs">
    <button class="tab-btn active" data-tab="libreta"><i class="fas fa-book"></i> Libreta</button>
    <button class="tab-btn" data-tab="mapa"><i class="fas fa-map"></i> Mapa</button>
    <button class="tab-btn" data-tab="pasaporte"><i class="fas fa-passport"></i> Pasaporte</button>
  </div>
  <div id="libretaTab" class="tab-content">
    <div class="filtros-container">
      <div class="filtro-group">
        <label><i class="fas fa-city"></i> Ciudad / Localidad</label>
        <select id="filtroCiudad" class="select-custom">
          <option value="todas">Todas las ciudades</option>
        </select>
      </div>
      <div class="filtro-group">
        <label><i class="fas fa-route"></i> Tipo de Ruta</label>
        <select id="filtroTipoCamino" class="select-custom">
          <option value="todos">Todos</option>
          <option value="Educativo">Ruta Educativa (Turismo/Historia)</option>
          <option value="Comercial">Ruta Comercial (Gastronomía/Economía Local)</option>
        </select>
      </div>
    </div>
    <div id="lugaresGrid" class="places-grid">
      <!-- cards dinámicas -->
    </div>
  </div>
  <div id="mapaTab" class="tab-content hidden-tab">
    <div class="map-container">
      <div id="map"></div>
      <div id="layerControl" class="layer-control">
        <button class="layer-btn active" data-layer="calles"><i class="fas fa-road"></i></button>
        <button class="layer-btn" data-layer="satelite"><i class="fas fa-satellite"></i></button>
        <button id="geolocationBtn" class="layer-btn"><i class="fas fa-location-dot"></i></button>
      </div>
    </div>
  </div>
  <div id="pasaporteTab" class="tab-content hidden-tab">
    <div id="pasaporteList" class="pasaporte-list">
      <!-- historial de conquistas -->
    </div>
  </div>
</div>

<!-- Modales -->
<div id="adminModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Acceso Admin</h3><button class="close-modal">&times;</button></div><form id="adminLoginForm"><div class="form-group"><label>Contraseña</label><input type="password" id="adminPassword" required></div><button type="submit" class="submit-btn">Entrar</button></form></div></div>
<div id="lugarModal" class="modal"><div class="modal-content"><div class="modal-header"><h3 id="modalTitle">Añadir Lugar</h3><button class="close-modal">&times;</button></div><form id="lugarForm"><input type="hidden" id="lugarId"><div class="form-group"><label>Nombre</label><input type="text" id="lugarNombre" required></div><div style="display:flex;gap:10px;padding:0 15px;"><div class="form-group" style="flex:1"><label>Lat</label><input type="number" step="any" id="lugarLat" required></div><div class="form-group" style="flex:1"><label>Lng</label><input type="number" step="any" id="lugarLng" required></div></div><div class="form-group"><label>Ciudad *</label><input type="text" id="lugarCiudad" placeholder="Ej. Diriamba" required></div><div class="form-group"><label>Tipo de Camino *</label><select id="lugarTipoCamino" required><option value="Educativo">Ruta Educativa</option><option value="Comercial">Ruta Comercial</option></select></div><div class="form-group"><label>URL (enlace)</label><input type="text" id="lugarUrl" placeholder="https://..."></div><div class="form-group"><label>Imagen URL</label><input type="text" id="lugarImagen"></div><div class="form-group"><label>Categoría (opcional)</label><input type="text" id="lugarCategoria"></div><button type="submit" class="submit-btn">Guardar</button></form></div></div>
<div id="userModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Iniciar Sesión</h3><button class="close-modal">&times;</button></div><div id="userModalBody"></div></div></div>
<div id="profileModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Mi Perfil</h3><button class="close-modal">&times;</button></div><div id="profileBody"></div></div></div>
<div id="comentarioModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Comentar lugar</h3><button class="close-modal">&times;</button></div><div id="comentarioBody"></div></div></div>
<div id="toastContainer" class="toast-container"></div>
<a href="https://wa.me/50588170531?text=Hola%20Guía%20Pinolera" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
<script src="/js/mapa.js"></script>

</body>
</html>
