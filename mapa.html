<body>
<div class="app-container">
  <header class="app-header">
    <div class="logo"><i class="fas fa-map-marked-alt"></i><h2>Guía Pinolera</h2></div>

      <button id="gpsBtn" class="icon-btn gps-btn" style="display:none;"><i class="fas fa-satellite-dish"></i></button>
      <button id="userBtn" class="icon-btn"><i class="fas fa-user-circle"></i></button>
      <button id="darkModeBtn" class="icon-btn"><i class="fas fa-moon"></i></button>

      <div id="adminPanelHeader" class="admin-panel-header hidden" style="display:none;"><span><i class="fas fa-crown"></i> Admin</span><button id="logoutAdminBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="libreta"><i class="fas fa-book"></i> Libreta</button>

    <button class="tab-btn" data-tab="pasaporte"><i class="fas fa-passport"></i> Pasaporte</button>
  </div>
  <div id="libretaTab" class="tab-content">
    <div class="filtros-container">

        <label><i class="fas fa-city"></i> Ciudad / Localidad</label>
        <select id="filtroCiudad" class="select-custom">
          <option value="todas">Todas las ciudades</option>
        </select>
      </div>
      <div class="filtro-group">
        <label><i class="fas fa-route"></i> Tipo de Ruta</label>
        <select id="filtroTipoCamino" class="select-custom">
          <option value="todos">Todos</option>
          <option value="Educativo">Ruta Educativa (Turismo/Historia)</option>
          <option value="Comercial">Ruta Comercial (Gastronomía/Economía Local)</option>
        </select>

    </div>
    <div id="lugaresGrid" class="places-grid">

  </div>
  <div id="mapaTab" class="tab-content hidden-tab">
    <div class="map-container">
      <div id="map"></div>
      <div id="layerControl" class="layer-control">

        <button class="layer-btn" data-layer="satelite"><i class="fas fa-satellite"></i></button>

</div>

<!-- Modales -->
<div id="adminModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Acceso Admin</h3><button class="close-modal">&times;</button></div><form id="adminLoginForm"><div class="form-group"><label>Contraseña</label><input type="password" id="adminPassword" required></div><button type="submit" class="submit-btn">Entrar</button></form></div></div>

  {
    "imports": {

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDocs, query, where, getDoc, Timestamp } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyA6jVICuE17KJcO34gE1brMxqWEfNd3Fy0",
    authDomain: "mapa-41b00.firebaseapp.com",
    projectId: "mapa-41b00",
    storageBucket: "mapa-41b00.firebasestorage.app",
    messagingSenderId: "535032835400",
    appId: "1:535032835400:web:68c079cbc3f419eafd177d",
    measurementId: "G-7R3DSH7PPN"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Variables globales
  let map, markerCluster, currentLayers = {}, allPlaces = [], isAdmin = false;
  let currentUser = null, userDocId = null, userPointsTotal = 0;
  let gpsActive = false, watchId = null;
  let ultimaRecompensaPorLugar = {};
  let activeTab = 'libreta';
  let selectedPlaceToCenter = null;

  // DOM
  const darkModeBtn = document.getElementById('darkModeBtn');
  const adminLoginBtn = document.getElementById('adminLoginBtn');
  const adminPanelHeader = document.getElementById('adminPanelHeader');
  const logoutAdminBtn = document.getElementById('logoutAdminBtn');
  const adminModal = document.getElementById('adminModal');
  const lugarModal = document.getElementById('lugarModal');
  const placesGrid = document.getElementById('lugaresGrid');
  const filtroCiudad = document.getElementById('filtroCiudad');
  const filtroTipoCamino = document.getElementById('filtroTipoCamino');
  const userBtn = document.getElementById('userBtn');
  const gpsBtn = document.getElementById('gpsBtn');
  const pointsSpan = document.getElementById('pointsValue');
  const userPointsDisplay = document.getElementById('userPointsDisplay');
  const pasaporteList = document.getElementById('pasaporteList');

  function mostrarToast(msg, tipo='info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas ${tipo==='error'?'fa-exclamation-circle':'fa-check-circle'}"></i> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ========== FIRESTORE: LUGARES (tiempo real) ==========
  let unsubscribePlaces = null;
  function cargarLugaresFirestore() {
    if(unsubscribePlaces) unsubscribePlaces();
    const colRef = collection(db, 'lugares');
    unsubscribePlaces = onSnapshot(colRef, (snapshot) => {
      allPlaces = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      actualizarFiltrosCiudad();
      actualizarLibreta();
      if(map && markerCluster) actualizarMarcadoresMapa();
    }, error => mostrarToast("Error Firestore: "+error.message, "error"));
  }

  function actualizarFiltrosCiudad() {
    const ciudades = [...new Set(allPlaces.map(p => p.ciudad).filter(c => c && c.trim() !== ''))];
    const currentVal = filtroCiudad.value;
    filtroCiudad.innerHTML = '<option value="todas">Todas las ciudades</option>' + ciudades.map(c => `<option value="${c}">${c}</option>`).join('');
    if(currentVal && ciudades.includes(currentVal)) filtroCiudad.value = currentVal;
    else filtroCiudad.value = 'todas';
  }

  function getFiltros() {
    const ciudad = filtroCiudad.value;
    const tipo = filtroTipoCamino.value;
    return { ciudad, tipo };
  }

  function actualizarLibreta() {
    const { ciudad, tipo } = getFiltros();
    let filtered = [...allPlaces];
    if(ciudad !== 'todas') filtered = filtered.filter(p => p.ciudad === ciudad);
    if(tipo !== 'todos') filtered = filtered.filter(p => p.tipoCamino === tipo);
    if(filtered.length === 0) { placesGrid.innerHTML = '<div style="padding:20px;text-align:center;">No hay lugares con esos filtros</div>'; return; }
    placesGrid.innerHTML = filtered.map(place => `
      <div class="place-card" data-id="${place.id}">
        <img src="${place.imagen || 'https://via.placeholder.com/300x160?text=Sin+imagen'}" onerror="this.src='https://via.placeholder.com/300x160?text=Imagen+no+disponible'">
        <div class="place-info-card">
          <h4>${place.nombre}</h4>
          <div class="place-badge">${place.ciudad || 'Sin ciudad'} • ${place.tipoCamino === 'Educativo' ? '📚 Educativo' : '🍽️ Comercial'}</div>
          <button class="explore-btn" data-id="${place.id}" data-lat="${place.lat}" data-lng="${place.lng}"><i class="fas fa-compass"></i> Explorar</button>
          ${isAdmin ? `<button class="explore-btn" style="background:#666; margin-top:5px;" data-edit="${place.id}">✏️ Editar</button>` : ''}
        </div>
      </div>
    `).join('');
    // Eventos explorar
    document.querySelectorAll('.explore-btn[data-id]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const place = allPlaces.find(p => p.id === id);
        if(place) {
          document.querySelector('.tab-btn[data-tab="mapa"]').click();
          setTimeout(() => {
            if(map) {
              map.setView([place.lat, place.lng], 15);
              // Abrir popup automático
              markerCluster.eachLayer(layer => {
                if(layer.getLatLng().lat === place.lat && layer.getLatLng().lng === place.lng) {
                  layer.openPopup();
                }
              });
            }
          }, 300);
        }
      });
      if(isAdmin && btn.dataset.edit) {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.edit;
          const p = allPlaces.find(p => p.id === id);
          if(p) editarLugarAdmin(p.id);
        });
      }
    });
  }

  // ========== MAPA ==========
  function initMap() {
    const mapDiv = document.getElementById('map');
    if(!mapDiv) return;
    if(map) map.remove();
    map = L.map('map').setView([12.8654, -85.2072], 8);
    currentLayers.calles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
    currentLayers.satelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });
    markerCluster = L.markerClusterGroup();
    map.addLayer(markerCluster);
    document.querySelectorAll('.layer-btn[data-layer]').forEach(btn => {
      btn.addEventListener('click', () => {
        const layer = btn.dataset.layer;
        Object.keys(currentLayers).forEach(l => map.removeLayer(currentLayers[l]));
        map.addLayer(currentLayers[layer]);
        document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    geolocationBtn.onclick = () => {
      if(navigator.geolocation) navigator.geolocation.getCurrentPosition(pos=>map.setView([pos.coords.latitude,pos.coords.longitude],13), ()=>mostrarToast("Error ubicación","error"));
    };
    if(isAdmin) {
      map.on('click', (e) => abrirFormularioNuevo(e.latlng.lat, e.latlng.lng));
    }
    actualizarMarcadoresMapa();
  }

  async function actualizarMarcadoresMapa() {
    if(!markerCluster) return;
    markerCluster.clearLayers();
    for(let place of allPlaces) {
      const popupDiv = document.createElement('div');
      popupDiv.innerHTML = `<b>${place.nombre}</b><br>${place.imagen?`<img src="${place.imagen}" style="width:100%;border-radius:8px;max-width:180px;">` : ''}<br><a href="${place.url||'#'}" target="_blank">🔗 Visitar</a>`;
      const checkBtn = document.createElement('button');
      checkBtn.innerHTML = '<i class="fas fa-map-marker-check"></i> Hacer Check-in aquí';
      checkBtn.style.display = 'block';
      checkBtn.style.margin = '5px 0';
      checkBtn.style.background = '#F57C00';
      checkBtn.style.color = 'white';
      checkBtn.style.border = 'none';
      checkBtn.style.padding = '6px';
      checkBtn.style.borderRadius = '20px';
      checkBtn.onclick = () => realizarCheckin(place.id, place.nombre);
      popupDiv.appendChild(checkBtn);
      
      // Botón comentar (solo si ya tiene visita)
      if(currentUser) {
        const yaVisito = await verificarSiYaVisito(currentUser.uid, place.id);
        if(yaVisito) {
          const commentBtn = document.createElement('button');
          commentBtn.innerHTML = '<i class="fas fa-star"></i> Comentar / Puntuar';
          commentBtn.style.display = 'block';
          commentBtn.style.marginTop = '5px';
          commentBtn.style.background = '#2E7D32';
          commentBtn.onclick = () => abrirComentario(place.id, place.nombre);
          popupDiv.appendChild(commentBtn);
        }
      }
      if(isAdmin) {
        const editBtn = document.createElement('button'); editBtn.innerText='✏️ Editar'; editBtn.onclick=()=>editarLugarAdmin(place.id);
        const delBtn = document.createElement('button'); delBtn.innerText='🗑️ Eliminar'; delBtn.onclick=()=>eliminarLugarFirestore(place.id);
        popupDiv.appendChild(editBtn); popupDiv.appendChild(delBtn);
      }
      const marker = L.marker([place.lat, place.lng]).bindPopup(popupDiv);
      markerCluster.addLayer(marker);
    }
  }

  async function realizarCheckin(lugarId, lugarNombre) {
    if(!currentUser) { mostrarToast("Inicia sesión para hacer check-in","error"); return; }
    if(!navigator.geolocation) { mostrarToast("GPS no soportado","error"); return; }
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const place = allPlaces.find(p => p.id === lugarId);
      if(!place) return;
      const dist = calcularDistancia(pos.coords.latitude, pos.coords.longitude, place.lat, place.lng);
      if(dist > 50) { mostrarToast(`Estás demasiado lejos (${Math.round(dist)}m). Acércate al lugar.`,"error"); return; }
      const yaVisito = await verificarSiYaVisito(currentUser.uid, lugarId);
      const puntos = yaVisito ? 2 : 10;
      await registrarVisita(currentUser.uid, lugarId, puntos, 'gps');
      await sumarPuntos(puntos, `Check-in en ${lugarNombre}`, lugarId);
      mostrarToast(`✅ Check-in exitoso! +${puntos} puntos`, "success");
      actualizarMarcadoresMapa();
      if(!yaVisito && currentUser) actualizarPasaporte(); // refrescar pasaporte
    }, () => mostrarToast("No se pudo obtener tu ubicación","error"));
  }

  function calcularDistancia(lat1,lon1,lat2,lon2){
    const R=6371e3; const φ1=lat1*Math.PI/180, φ2=lat2*Math.PI/180; const Δφ=(lat2-lat1)*Math.PI/180, Δλ=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }

  async function verificarSiYaVisito(uid, lugarId) {
    const q = query(collection(db, 'visitas'), where('usuarioId', '==', uid), where('lugarId', '==', lugarId));
    const snap = await getDocs(q);
    return !snap.empty;
  }

  async function registrarVisita(uid, lugarId, puntos, tipo) {
    await addDoc(collection(db, 'visitas'), { usuarioId: uid, lugarId, fecha: new Date(), puntos, tipo });
  }

  async function sumarPuntos(cantidad, motivo, lugarId=null) {
    if(!currentUser) return;
    const nuevos = userPointsTotal + cantidad;
    await updateDoc(doc(db, 'usuarios', userDocId), { puntos: nuevos });
    userPointsTotal = nuevos;
    pointsSpan.innerText = userPointsTotal;
    mostrarToast(`+${cantidad} puntos (${motivo})`, "success");
  }

  // ========== PASAPORTE ==========
  async function actualizarPasaporte() {
    if(!currentUser) { pasaporteList.innerHTML = '<div style="padding:20px;text-align:center;">Inicia sesión para ver tu pasaporte</div>'; return; }
    const visitsSnap = await getDocs(query(collection(db, 'visitas'), where('usuarioId', '==', currentUser.uid)));
    const visitasMap = new Map(); // lugarId -> { count, lastDate }
    visitsSnap.forEach(doc => {
      const data = doc.data();
      const lugarId = data.lugarId;
      if(!visitasMap.has(lugarId)) visitasMap.set(lugarId, { count: 0 });
      visitasMap.get(lugarId).count++;
    });
    const comentariosSnap = await getDocs(query(collection(db, 'comentarios'), where('usuarioId', '==', currentUser.uid)));
    const comentariosMap = new Map();
    comentariosSnap.forEach(doc => { const c = doc.data(); comentariosMap.set(c.lugarId, { texto: c.texto, estrellas: c.estrellas }); });
    
    if(visitasMap.size === 0) { pasaporteList.innerHTML = '<div style="padding:20px;text-align:center;">Aún no has visitado ningún lugar. ¡Explora!</div>'; return; }
    let html = '';
    for(let [lugarId, data] of visitasMap.entries()) {
      const lugar = allPlaces.find(p => p.id === lugarId);
      if(!lugar) continue;
      const comentario = comentariosMap.get(lugarId);
      html += `
        <div class="pasaporte-item">
          <img class="pasaporte-img" src="${lugar.imagen || 'https://via.placeholder.com/80'}" onerror="this.src='https://via.placeholder.com/80'">
          <div class="pasaporte-info">
            <h4>${lugar.nombre}</h4>
            <div><span class="visits-count">Visitas: ${data.count}</span>  |  ${lugar.ciudad} • ${lugar.tipoCamino === 'Educativo' ? 'Educativo' : 'Comercial'}</div>
            ${comentario ? `<div class="user-review"><i class="fas fa-comment"></i> "${comentario.texto}"<br>${'⭐'.repeat(comentario.estrellas)}</div>` : '<div class="user-review"><i class="fas fa-edit"></i> Sin reseña aún</div>'}
          </div>
        </div>
      `;
    }
    pasaporteList.innerHTML = html;
  }

  // ========== ADMIN CRUD ==========
  const ADMIN_PASSWORD = "Diriamba2026";
  function entrarModoAdmin() { isAdmin=true; adminLoginBtn.style.display='none'; adminPanelHeader.style.display='flex'; mostrarToast("Admin activado","success"); if(map) map.on('click', onMapClick); actualizarLibreta(); actualizarMarcadoresMapa(); }
  function salirModoAdmin() { isAdmin=false; adminLoginBtn.style.display='flex'; adminPanelHeader.style.display='none'; if(map) map.off('click'); actualizarLibreta(); actualizarMarcadoresMapa(); }
  function onMapClick(e) { if(isAdmin) abrirFormularioNuevo(e.latlng.lat, e.latlng.lng); }
  adminLoginBtn.onclick = () => adminModal.style.display='flex';
  document.getElementById('adminLoginForm').addEventListener('submit',(e)=>{e.preventDefault(); if(document.getElementById('adminPassword').value===ADMIN_PASSWORD){adminModal.style.display='none';entrarModoAdmin();}else mostrarToast("Contraseña incorrecta","error");});
  logoutAdminBtn.onclick = salirModoAdmin;
  function abrirFormularioNuevo(lat,lng) { document.getElementById('modalTitle').innerText='Añadir Lugar'; document.getElementById('lugarId').value=''; document.getElementById('lugarNombre').value=''; document.getElementById('lugarLat').value=lat.toFixed(6); document.getElementById('lugarLng').value=lng.toFixed(6); document.getElementById('lugarCiudad').value=''; document.getElementById('lugarTipoCamino').value='Educativo'; document.getElementById('lugarUrl').value=''; document.getElementById('lugarImagen').value=''; document.getElementById('lugarCategoria').value=''; lugarModal.style.display='flex'; }
  function editarLugarAdmin(id) { const p=allPlaces.find(p=>p.id===id); if(!p) return; document.getElementById('modalTitle').innerText='Editar Lugar'; document.getElementById('lugarId').value=p.id; document.getElementById('lugarNombre').value=p.nombre; document.getElementById('lugarLat').value=p.lat; document.getElementById('lugarLng').value=p.lng; document.getElementById('lugarCiudad').value=p.ciudad||''; document.getElementById('lugarTipoCamino').value=p.tipoCamino||'Educativo'; document.getElementById('lugarUrl').value=p.url||''; document.getElementById('lugarImagen').value=p.imagen||''; document.getElementById('lugarCategoria').value=p.categoria||''; lugarModal.style.display='flex'; }
  window.eliminarLugarFirestore = async (id) => { if(confirm('¿Eliminar lugar?')) await deleteDoc(doc(db,'lugares',id)); };
  document.getElementById('lugarForm').addEventListener('submit', async(e) => {
    e.preventDefault(); const id=document.getElementById('lugarId').value; const nombre=document.getElementById('lugarNombre').value.trim(); const lat=parseFloat(document.getElementById('lugarLat').value); const lng=parseFloat(document.getElementById('lugarLng').value); const ciudad=document.getElementById('lugarCiudad').value.trim(); const tipoCamino=document.getElementById('lugarTipoCamino').value; const url=document.getElementById('lugarUrl').value.trim(); const imagen=document.getElementById('lugarImagen').value.trim(); const categoria=document.getElementById('lugarCategoria').value.trim();
    if(!nombre || isNaN(lat) || isNaN(lng) || !ciudad) { mostrarToast("Complete nombre, coordenadas y ciudad","error"); return; }
    const data = { nombre, lat, lng, ciudad, tipoCamino, url, imagen, categoria };
    if(id) await updateDoc(doc(db,'lugares',id), data);
    else await addDoc(collection(db,'lugares'), data);
    lugarModal.style.display='none';
  });

  // ========== COMENTARIOS ==========
  async function abrirComentario(lugarId, lugarNombre) {
    if(!currentUser) return;
    const yaVisito = await verificarSiYaVisito(currentUser.uid, lugarId);
    if(!yaVisito) { mostrarToast("Primero haz check-in para comentar","error"); return; }
    const q = query(collection(db,'comentarios'), where('usuarioId','==',currentUser.uid), where('lugarId','==',lugarId));
    const snap = await getDocs(q);
    let existente = null;
    if(!snap.empty) existente = snap.docs[0];
    const modalBody = document.getElementById('comentarioBody');
    modalBody.innerHTML = `<div style="padding:15px;"><h4>${lugarNombre}</h4>
      <div class="form-group"><label>Puntuación (1-5)</label><select id="estrellas">${[1,2,3,4,5].map(s=>`<option value="${s}" ${existente && existente.data().estrellas==s?'selected':''}>${'⭐'.repeat(s)}</option>`).join('')}</select></div>
      <div class="form-group"><label>Comentario</label><textarea id="comentarioTexto" rows="3">${existente?existente.data().texto:''}</textarea></div>
      <button id="guardarComentarioBtn" class="submit-btn">Guardar comentario</button>${existente?'<button id="eliminarComentarioBtn" class="submit-btn" style="background:#d32f2f;">Eliminar</button>':''}</div>`;
    document.getElementById('guardarComentarioBtn').onclick = async () => {
      const estrellas = parseInt(document.getElementById('estrellas').value);
      const texto = document.getElementById('comentarioTexto').value.trim();
      if(!texto){ mostrarToast("Escribe un comentario","error"); return; }
      if(existente) await updateDoc(doc(db,'comentarios',existente.id), { texto, estrellas, editado: true });
      else {
        await addDoc(collection(db,'comentarios'), { usuarioId: currentUser.uid, lugarId, texto, estrellas, fecha: new Date(), editado: false });
        await sumarPuntos(5, `Comentario en ${lugarNombre}`, lugarId);
        await sumarPuntos(2, `Valoración en ${lugarNombre}`, lugarId);
      }
      document.getElementById('comentarioModal').style.display='none';
      if(currentUser) actualizarPasaporte();
    };
    if(existente) document.getElementById('eliminarComentarioBtn').onclick = async()=>{ await deleteDoc(doc(db,'comentarios',existente.id)); mostrarToast("Comentario eliminado","info"); document.getElementById('comentarioModal').style.display='none'; actualizarPasaporte(); };
    document.getElementById('comentarioModal').style.display='flex';
  }

  // ========== USUARIO Y AUTENTICACIÓN ==========
  async function cargarPuntosUsuario() {
    if(!currentUser) return;
    const q = query(collection(db,'usuarios'), where('uid','==',currentUser.uid));
    const snap = await getDocs(q);
    if(!snap.empty){ userDocId = snap.docs[0].id; userPointsTotal = snap.docs[0].data().puntos||0; pointsSpan.innerText = userPointsTotal; }
    else { const ref = await addDoc(collection(db,'usuarios'), { uid:currentUser.uid, email:currentUser.email, nombre:currentUser.displayName||currentUser.email, puntos:0 }); userDocId = ref.id; userPointsTotal=0; pointsSpan.innerText='0'; }
  }
  function actualizarUIUsuario(){
    if(currentUser){ userPointsDisplay.style.display='flex'; gpsBtn.style.display='flex'; userBtn.innerHTML='<i class="fas fa-user-check"></i>'; cargarPuntosUsuario(); actualizarPasaporte(); }
    else { userPointsDisplay.style.display='none'; gpsBtn.style.display='none'; userBtn.innerHTML='<i class="fas fa-user-circle"></i>'; if(gpsActive && watchId) navigator.geolocation.clearWatch(watchId); gpsActive=false; pasaporteList.innerHTML = '<div>Inicia sesión para ver tu pasaporte</div>'; }
  }
  function mostrarModalUsuario(){
    if(currentUser){
      document.getElementById('profileBody').innerHTML = `<div style="text-align:center;padding:15px;"><img src="${currentUser.photoURL||'https://via.placeholder.com/80'}" style="width:80px;border-radius:50%;"><h4>${currentUser.displayName||currentUser.email}</h4><p>Puntos: ${userPointsTotal}</p><button id="cerrarSesionBtn" class="submit-btn" style="background:#d32f2f;">Cerrar sesión</button><button id="eliminarCuentaBtn" class="submit-btn" style="background:#666;">Eliminar cuenta</button></div>`;
      document.getElementById('cerrarSesionBtn').onclick = async()=>{ await signOut(auth); location.reload(); };
      document.getElementById('eliminarCuentaBtn').onclick = async () => { if(confirm("¿Eliminar cuenta?")){ await currentUser.delete(); await signOut(auth); location.reload(); } };
      profileModal.style.display='flex';
    } else {
      document.getElementById('userModalBody').innerHTML = `<div style="padding:20px;"><button id="googleLoginBtn" class="submit-btn" style="background:#4285F4;">Google</button><hr><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Contraseña"><button id="emailLoginBtn" class="submit-btn">Iniciar sesión</button><button id="emailRegistroBtn" class="submit-btn" style="background:#2E7D32;">Registrarse</button></div>`;
      document.getElementById('googleLoginBtn').onclick = ()=> signInWithPopup(auth,provider).then(()=>location.reload());
      document.getElementById('emailLoginBtn').onclick = ()=>{ const email=document.getElementById('loginEmail').value, pass=document.getElementById('loginPassword').value; signInWithEmailAndPassword(auth,email,pass).then(()=>location.reload()); };
      document.getElementById('emailRegistroBtn').onclick = ()=>{ const email=document.getElementById('loginEmail').value, pass=document.getElementById('loginPassword').value; createUserWithEmailAndPassword(auth,email,pass).then(()=>location.reload()); };
      userModal.style.display='flex';
    }
  }
  gpsBtn.onclick = () => { if(!currentUser) mostrarToast("Inicia sesión","error"); else { if(gpsActive){ if(watchId) navigator.geolocation.clearWatch(watchId); gpsActive=false; gpsBtn.classList.remove('active'); mostrarToast("GPS desactivado","info"); } else { navigator.geolocation.getCurrentPosition(()=>{ gpsActive=true; gpsBtn.classList.add('active'); watchId = navigator.geolocation.watchPosition(async (pos)=>{ for(let place of allPlaces){ const dist = calcularDistancia(pos.coords.latitude,pos.coords.longitude,place.lat,place.lng); if(dist<=50 && (!ultimaRecompensaPorLugar[place.id] || Date.now()-ultimaRecompensaPorLugar[place.id]>60000)){ const ya = await verificarSiYaVisito(currentUser.uid, place.id); const pts = ya?2:10; await registrarVisita(currentUser.uid,place.id,pts,'gps'); await sumarPuntos(pts,`GPS ${place.nombre}`,place.id); ultimaRecompensaPorLugar[place.id]=Date.now(); actualizarMarcadoresMapa(); actualizarPasaporte(); } } }, ()=>mostrarToast("Error GPS","error"), {enableHighAccuracy:true}); }, ()=>mostrarToast("Permiso denegado","error")); } } };
  userBtn.onclick = mostrarModalUsuario;
  onAuthStateChanged(auth, (user) => { currentUser = user; actualizarUIUsuario(); if(map && markerCluster) actualizarMarcadoresMapa(); });
  // tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('libretaTab').classList.add('hidden-tab');
      document.getElementById('mapaTab').classList.add('hidden-tab');
      document.getElementById('pasaporteTab').classList.add('hidden-tab');
      if(tab === 'libreta') document.getElementById('libretaTab').classList.remove('hidden-tab');
      if(tab === 'mapa') { document.getElementById('mapaTab').classList.remove('hidden-tab'); if(map) setTimeout(()=> map.invalidateSize(), 100); else initMap(); }
      if(tab === 'pasaporte') { document.getElementById('pasaporteTab').classList.remove('hidden-tab'); actualizarPasaporte(); }
    });
  });
  filtroCiudad.addEventListener('change', () => actualizarLibreta());
  filtroTipoCamino.addEventListener('change', () => actualizarLibreta());
  darkModeBtn.onclick = () => { document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode', document.body.classList.contains('dark-mode')); darkModeBtn.innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>'; };
  if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
  document.querySelectorAll('.close-modal').forEach(btn => btn.onclick = () => btn.closest('.modal').style.display='none');
  cargarLugaresFirestore();
  initMap();
</script>
