<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Guía Pinolero - Autenticación</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      position: relative;
      overflow-x: hidden;
    }
    .wave-bg {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.2;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 2rem 1.8rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      width: 100%;
      max-width: 500px;
      text-align: center;
    }
    .mascota img { width: 90px; margin-bottom: 1rem; }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #FFE259, #FFA751);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle { color: rgba(255,255,255,0.9); margin-bottom: 2rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
      margin-bottom: 12px;
      border: none;
    }
    .btn-primary { background: linear-gradient(95deg, #F9A826, #F57C00); color: white; }
    .btn-google { background: white; color: #444; border: 1px solid #ddd; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.5); color: white; }
    .input-group { margin-bottom: 1rem; text-align: left; }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 40px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 0.95rem;
      outline: none;
    }
    .input-group input::placeholder { color: rgba(255,255,255,0.6); }
    .divider { display: flex; align-items: center; text-align: center; color: rgba(255,255,255,0.5); margin: 1.2rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .divider span { margin: 0 10px; }
    .menu-section { display: none; margin-top: 2rem; width: 100%; animation: fadeInUp 0.6s ease; }
    .menu-section h2 { color: white; text-align: center; margin-bottom: 1.5rem; }
    .menu-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5rem; }
    .menu-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1.5rem;
      width: 200px;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }
    .menu-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.25); }
    .menu-card span { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
    .toast-message {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      z-index: 1000;
    }
    .whatsapp-float {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background-color: #25D366;
      color: white;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      text-decoration: none;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 550px) {
      .glass-card { padding: 1.5rem; }
      h1 { font-size: 2rem; }
      .menu-card { width: 160px; padding: 1rem; }
    }
   
  </style>
</head>
<body>
  <div class="wave-bg">
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path fill="rgba(255,255,255,0.1)" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,176C672,171,768,181,864,197.3C960,213,1056,235,1152,224C1248,213,1344,171,1392,149.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
  </div>

  <div class="container">
    <div id="authCard" class="glass-card">
      <div class="mascota"><img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="Mascota" /></div>
      <h1>Guía Pinolero</h1>
      <p class="subtitle">Explora Nicaragua jugando y descubriendo lugares increíbles 🌋🌊</p>
      <div id="authForms">
        <div id="loginForm">
          <div class="input-group"><input type="email" id="loginEmail" placeholder="Correo electrónico" /></div>
          <div class="input-group"><input type="password" id="loginPassword" placeholder="Contraseña" /></div>
          <button id="doLoginBtn" class="btn btn-primary">Iniciar sesión</button>
          <button id="googleLoginBtn" class="btn btn-google"><i class="fab fa-google"></i> Continuar con Google</button>
          <div class="divider"><span>o</span></div>
          <button id="showRegisterBtn" class="btn btn-outline">Crear cuenta nueva</button>
        </div>
        <div id="registerForm" style="display:none;">
          <div class="input-group"><input type="email" id="regEmail" placeholder="Correo electrónico" /></div>
          <div class="input-group"><input type="password" id="regPassword" placeholder="Contraseña" /></div>
          <button id="doRegisterBtn" class="btn btn-primary">Registrarse</button>
          <button id="backToLoginBtn" class="btn btn-outline">← Volver al inicio</button>
        </div>
      </div>
    </div>
        
    <div id="menuSection" class="menu-section">
      <h2>¡Bienvenido, <span id="userName"></span>! ¿Qué deseas explorar?</h2>
      <div class="menu-buttons">
        <a href="../juegos/juegos.html" class="menu-card"><span>🎮</span><h3>Juegos Turísticos</h3></a>
        <a href="mapa.html" class="menu-card"><span>🗺️</span><h3>Mapa Interactivo</h3></a>
        <a href="../lugares/lugares.html" class="menu-card"><span>🧭</span><h3>Lugares</h3></a>
        <a href="comunidad.html" class="menu-card"><span>👩🏾‍🤝‍🧑🏻</span><h3>Comunidad</h3></a>
        <a href="https://nicaguia.base44.app" class="menu-card"><span>👩🏾‍🤝‍🧑</span><h3>Escanea y aprende</h3></a>
      </div>
      <div style="margin-top: 2rem;"><button id="logoutBtn" class="btn btn-outline" style="width: auto; padding: 8px 20px;">Cerrar sesión</button></div>
    </div>
  </div>

  <a href="https://wa.me/50588170531?text=Hola%20quiero%20consultar%20sobre%20Nica%20Explorer" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
  <div id="toast" class="toast-message" style="display: none;"></div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "firebase/auth";
    import { getFirestore, doc, setDoc, getDoc } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyA6jVICuE17KJcO34gE1brMxqWEfNd3Fy0",
      authDomain: "mapa-41b00.firebaseapp.com",
      projectId: "mapa-41b00",
      storageBucket: "mapa-41b00.firebasestorage.app",
      messagingSenderId: "535032835400",
      appId: "1:535032835400:web:68c079cbc3f419eafd177d",
      measurementId: "G-7R3DSH7PPN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Elementos
    const authCard = document.getElementById('authCard');
    const menuSection = document.getElementById('menuSection');
    const userNameSpan = document.getElementById('userName');
    const loginFormDiv = document.getElementById('loginForm');
    const registerFormDiv = document.getElementById('registerForm');
    const toastDiv = document.getElementById('toast');

    function showToast(msg, isError = false) {
      toastDiv.textContent = msg;
      toastDiv.style.display = 'block';
      toastDiv.style.background = isError ? 'rgba(220,53,69,0.9)' : 'rgba(0,0,0,0.8)';
      setTimeout(() => { toastDiv.style.display = 'none'; }, 3000);
    }

    // Guardar usuario en Firestore (si no existe)
    async function guardarUsuarioEnFirestore(user) {
      const userRef = doc(db, 'usuarios', user.uid);
      const userSnap = await getDoc(userRef);
      if (!userSnap.exists()) {
        await setDoc(userRef, {
          uid: user.uid,
          email: user.email,
          nombre: user.displayName || user.email.split('@')[0],
          fotoURL: user.photoURL || '',
          puntos: 0,
          fechaRegistro: new Date(),
          sonidosActivos: true,
          tema: 'claro'
        });
        console.log("Usuario guardado en Firestore");
      }
    }

    function updateUI(user) {
      if (user) {
        authCard.style.display = 'none';
        menuSection.style.display = 'block';
        const displayName = user.displayName || user.email.split('@')[0];
        userNameSpan.textContent = displayName;
        // Guardar perfil en Firestore si es nuevo
        guardarUsuarioEnFirestore(user);
      } else {
        authCard.style.display = 'block';
        menuSection.style.display = 'none';
        loginFormDiv.style.display = 'block';
        registerFormDiv.style.display = 'none';
        // Limpiar campos
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
      }
    }

    onAuthStateChanged(auth, (user) => {
      updateUI(user);
    });

    // Login email/pass
    document.getElementById('doLoginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return showToast('Completa todos los campos', true);
      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast('¡Bienvenido de vuelta!');
      } catch (error) {
        let msg = error.message;
        if (msg.includes('user-not-found')) msg = 'Usuario no registrado';
        else if (msg.includes('wrong-password')) msg = 'Contraseña incorrecta';
        showToast(msg, true);
      }
    });

    // Registro
    document.getElementById('doRegisterBtn').addEventListener('click', async () => {
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!email || !password) return showToast('Completa todos los campos', true);
      if (password.length < 6) return showToast('La contraseña debe tener al menos 6 caracteres', true);
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        // Guardar inmediatamente en Firestore
        await guardarUsuarioEnFirestore(userCredential.user);
        showToast('Registro exitoso. ¡Ya puedes explorar!');
      } catch (error) {
        let msg = error.message;
        if (msg.includes('email-already-in-use')) msg = 'El correo ya está registrado';
        showToast(msg, true);
      }
    });

    // Google
    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        await guardarUsuarioEnFirestore(result.user);
        showToast('Inicio con Google correcto');
      } catch (error) {
        showToast('Error con Google: ' + error.message, true);
      }
    });

    // Cambiar formularios
    document.getElementById('showRegisterBtn').addEventListener('click', () => {
      loginFormDiv.style.display = 'none';
      registerFormDiv.style.display = 'block';
    });
    document.getElementById('backToLoginBtn').addEventListener('click', () => {
      registerFormDiv.style.display = 'none';
      loginFormDiv.style.display = 'block';
    });

    // Cerrar sesión
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      showToast('Sesión cerrada');
    });
  </script>
</body>
</html>
