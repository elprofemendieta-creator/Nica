<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nica Explorer</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<!-- Copia y pega esto donde quieras que aparezca tu mascota -->
<iframe 
  src="https://github.io" 
  width="300px" 
  height="400px" 
  style="border: none; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);"
  title="Mascota Virtual IA">
</iframe>
  <div id="pet-container" style="text-align: center; font-family: sans-serif; border: 2px solid #333; padding: 20px; width: 200px; border-radius: 15px;">
  <div id="pet-avatar" style="font-size: 50px;">😺</div>
  <p id="pet-status">Estado: Feliz</p>
  <button onclick="changeState('🍖', 'Alimentado')">Alimentar</button>
  <button onclick="changeState('😴', 'Durmiendo')">Dormir</button>
</div>

<script>
  function changeState(emoji, text) {
    document.getElementById('pet-avatar').innerText = emoji;
    document.getElementById('pet-status').innerText = 'Estado: ' + text;
    // Volver al estado normal en 3 segundos
    setTimeout(() => {
      document.getElementById('pet-avatar').innerText = '😺';
      document.getElementById('pet-status').innerText = 'Estado: Esperando...';
    }, 3000);
  }
</script>
  <div class="background"></div>

  <main class="container">

    <section class="hero">

      <div class="mascota">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="Mascota" />
      </div>

      <h1>Nica Explorer</h1>

      <p class="subtitle">
        Explora Nicaragua jugando y descubriendo lugares increíbles 🌋🌊
      </p>

      <button id="startBtn" class="start-btn">
        Iniciar Aventura
      </button>

    </section>

    <section class="menu hidden" id="menuSection">

      <h2>¿Qué deseas explorar?</h2>

      <div class="menu-buttons">

        <a href="juegos.html" class="menu-card">
          <span>🎮</span>
          <h3>Juegos Turísticos</h3>
        </a>

        <a href="mapa.html" class="menu-card">
          <span>🗺️</span>
          <h3>Mapa Interactivo</h3>
        </a>

      </div>

    </section>

  </main>

  <script src="app.js"></script>

</body>
</html>
