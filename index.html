<!DOCTYPE html>
<html lang="es">
<head>

</head>
<body>
<!-- Cuadro interactivo de mi Mascota Virtual con IA -->
<iframe 
  src="https://elprofemendieta-creator.github.io/forkMonkey/"

  height="450px" 
  style="border: 3px solid #333; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);"
  title="Mi ForkMonkey IA">
</iframe>
  <div class="background"></div>

  <main class="container">

    <section class="hero">

    <section class="menu hidden" id="menuSection">

      <div class="menu-buttons">

        <a href="juegos.html" class="menu-card">

        </a>

        <a href="mapa.html" class="menu-card">
          <span>🗺️</span>
