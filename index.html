<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Turismo Nicaragua - Explora el país</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Estilos propios -->
    <link rel="stylesheet" href="/styles.css">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SheetJS para exportar Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <!-- Pantalla de Login/Registro (similar a antes, con modificaciones) -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-umbrella-beach"></i>
                <h1>Turismo Nicaragua</h1>
                <p>Explora, califica y comparte tus experiencias</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
                <button class="tab-btn" data-tab="register">Registrarse</button>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Nick o Email" id="loginEmail" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Contraseña" id="loginPassword" required>
                </div>
                <button type="submit" class="auth-btn">Entrar <i class="fas fa-arrow-right"></i></button>
                <div class="forgot-password">
                    <a href="#" id="forgotPasswordLink">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
            
            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Nombre completo" id="regNombre" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-tag"></i>
                    <input type="text" placeholder="Nick (único)" id="regNick" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Correo electrónico" id="regEmail" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Contraseña" id="regPassword" required>
                </div>
                <div class="input-row">
                    <div class="input-group half">
                        <i class="fas fa-calendar"></i>
                        <input type="number" placeholder="Edad" id="regEdad">
                    </div>
                    <div class="input-group half">
                        <i class="fas fa-venus-mars"></i>
                        <select id="regSexo">
                            <option value="">Sexo</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="auth-btn">Registrarse <i class="fas fa-user-plus"></i></button>
            </form>
        </div>
    </div>
    
    <!-- Pantalla Principal (App) -->
    <div id="appScreen" class="app-screen hidden">
        <!-- Header igual que antes -->
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-map-marked-alt"></i>
                <h2>Nicaragua Turismo</h2>
            </div>
            <div class="header-controls">
                <button id="darkModeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userNick"></span>
                    <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </header>
        
        <!-- Panel de Notificaciones (usando Supabase Realtime) -->
        <div id="notificationPanel" class="notification-panel">
            <div class="notification-header">
                <i class="fas fa-bell"></i>
                <span>Notificaciones</span>
                <button id="closeNotifPanel" class="close-notif">&times;</button>
            </div>
            <div id="notificationList" class="notification-list"></div>
        </div>
        
        <!-- Main Content -->
        <div class="main-container">
            <aside class="sidebar">
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Buscar lugar...">
                    </div>
                    <div class="filter-section">
                        <label><i class="fas fa-tags"></i> Etiquetas:</label>
                        <div id="etiquetasFiltro" class="etiquetas-container"></div>
                    </div>
                </div>
                
                <div class="places-list-container">
                    <h3><i class="fas fa-map-pin"></i> Lugares Turísticos</h3>
                    <div id="placesList" class="places-list"></div>
                </div>
                
                <!-- Panel Admin (solo visible para admin) -->
                <div id="adminPanel" class="admin-panel hidden">
                    <h3><i class="fas fa-crown"></i> Panel Admin</h3>
                    <button id="addPlaceBtn" class="admin-btn"><i class="fas fa-plus"></i> Añadir Lugar</button>
                    <button id="verRankingBtn" class="admin-btn"><i class="fas fa-chart-line"></i> Ver Ranking</button>
                    <button id="exportHistorialBtn" class="admin-btn"><i class="fas fa-file-excel"></i> Exportar Historial</button>
                    <button id="sendNotificationBtn" class="admin-btn"><i class="fas fa-bullhorn"></i> Enviar Notificación</button>
                    <div class="stats-preview" id="statsPreview"></div>
                </div>
            </aside>
            
            <div class="map-container">
                <div id="map"></div>
                <div id="layerControl" class="layer-control">
                    <button class="layer-btn active" data-layer="calles"><i class="fas fa-road"></i></button>
                    <button class="layer-btn" data-layer="satelite"><i class="fas fa-satellite"></i></button>
                    <button class="layer-btn" data-layer="relieve"><i class="fas fa-mountain"></i></button>
                    <button id="geolocationBtn" class="layer-btn"><i class="fas fa-location-dot"></i></button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modales (igual que antes, pero adaptados) -->
    <div id="lugarModal" class="modal"><div class="modal-content"><div class="modal-header"><h3 id="modalTitle">Añadir Lugar</h3><button class="close-modal">&times;</button></div><form id="lugarForm"><input type="hidden" id="lugarId"><div class="form-group"><label>Nombre</label><input type="text" id="lugarNombre" required></div><div class="form-row"><div class="form-group half"><label>Latitud</label><input type="number" step="any" id="lugarLat" required></div><div class="form-group half"><label>Longitud</label><input type="number" step="any" id="lugarLng" required></div></div><div class="form-group"><label>URL del HTML (ej: lugar.html)</label><input type="text" id="lugarUrl" placeholder="lugares_html/mi_lugar.html"></div><div class="form-group"><label>URL Imagen</label><input type="text" id="lugarImagen" placeholder="https://..."></div><div class="form-group"><label>Etiquetas (separadas por coma)</label><input type="text" id="lugarEtiquetas" placeholder="playa, naturaleza"></div><button type="submit" class="submit-btn">Guardar</button></form></div></div>
    
    <div id="rankingModal" class="modal"><div class="modal-content large"><div class="modal-header"><h3>Ranking</h3><button class="close-modal">&times;</button></div><div class="ranking-tabs"><button class="rank-tab active" data-rank="visitas">Más Visitados</button><button class="rank-tab" data-rank="puntuacion">Mejor Puntuados</button></div><div id="rankingContent" class="ranking-content"></div><button id="exportRankingBtn" class="export-excel-btn">Exportar a Excel</button></div></div>
    
    <div id="notifModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Enviar Notificación</h3><button class="close-modal">&times;</button></div><form id="notifForm"><div class="form-group"><label>Tipo</label><select id="notifTipo"><option value="promocion">Promoción</option><option value="sistema">Información</option></select></div><div class="form-group"><label>Mensaje</label><textarea id="notifMensaje" rows="3" required></textarea></div><button type="submit" class="submit-btn">Enviar</button></form></div></div>
    
    <div id="resetPasswordModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Recuperar Contraseña</h3><button class="close-modal">&times;</button></div><form id="resetPasswordForm"><div class="form-group"><label>Correo electrónico</label><input type="email" id="resetEmail" required></div><button type="submit" class="submit-btn">Enviar enlace</button></form></div></div>
    
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="/script.js"></script>
</body>
</html>
