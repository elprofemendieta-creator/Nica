<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mapa Turístico de Nicaragua</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet MarkerCluster (opcional, si lo usas en tu JS) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

  <!-- Tus estilos personalizados -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Panel lateral -->
  <div id="sidebar">
    <h2>🌋 Lugares de Nicaragua</h2>

    <!-- Búsqueda -->
    <input type="text" id="busqueda" placeholder="Buscar por nombre...">

    <!-- Filtro por categoría -->
    <select id="filtro-categoria">
      <option value="">Todas las categorías</option>
      <option value="playa">Playa</option>
      <option value="volcan">Volcán</option>
      <option value="ciudad">Ciudad</option>
      <option value="naturaleza">Naturaleza</option>
      <option value="cultural">Cultural</option>
      <option value="otro">Otro</option>
    </select>

    <!-- Lista de lugares -->
    <div id="lista-lugares"></div>

    <!-- Controles de administrador y modo oscuro -->
    <div id="controles">
      <button id="btn-admin">🔐 Admin</button>
      <button id="modo-oscuro">🌓 Modo oscuro</button>
    </div>
  </div>

  <!-- Contenedor del mapa -->
  <div id="mapa"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet MarkerCluster JS (opcional) -->
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Tu lógica -->
  <script src="script.js"></script>
</body>
</html>
