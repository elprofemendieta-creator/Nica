<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viste al Güegüense</title>
    <style>
        /* ===== ESTILOS GENERALES ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #1a3c2a, #2a5a3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: linear-gradient(180deg, #fef9e8, #f5e6c8);
            border-radius: 40px 40px 30px 30px;
            padding: 30px 30px 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 2px #f0d5a8;
            border-bottom: 8px solid #b68b5a;
        }

        /* ===== ENCABEZADO ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #8b1a1a;
            padding: 12px 25px;
            border-radius: 60px;
            margin-bottom: 25px;
            color: #f9e8c1;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #4a0e0e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .stats {
            display: flex;
            gap: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #621212;
            padding: 6px 20px;
            border-radius: 40px;
        }

        .header .stats span {
            color: #ffd966;
        }

        /* ===== ÁREA DEL PERSONAJE ===== */
        .character-area {
            position: relative;
            background: radial-gradient(ellipse at bottom, #d4b48c, #b58b6b);
            border-radius: 30px;
            min-height: 380px;
            height: 45vh;
            max-height: 500px;
            margin-bottom: 20px;
            border: 6px solid #8b6b4a;
            box-shadow: inset 0 -20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
        }

        /* Base del personaje (silueta) */
        .character-base {
            position: relative;
            width: 220px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 15px;
        }

        /* Cuerpo base (dibujo simple) */
        .body-silhouette {
            position: relative;
            width: 160px;
            height: 280px;
        }

        .body-silhouette .head {
            width: 80px;
            height: 80px;
            background: #dbb88c;
            border-radius: 50%;
            margin: 0 auto 5px;
            border: 3px solid #7a5a3a;
            position: relative;
        }

        .body-silhouette .head::after {
            content: "☺";
            font-size: 2.4rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
        }

        .body-silhouette .torso {
            width: 130px;
            height: 120px;
            background: #dbb88c;
            border-radius: 20px 20px 10px 10px;
            margin: 0 auto;
            border: 3px solid #7a5a3a;
        }

        .body-silhouette .legs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: -5px;
        }

        .body-silhouette .legs div {
            width: 40px;
            height: 70px;
            background: #dbb88c;
            border-radius: 0 0 15px 15px;
            border: 3px solid #7a5a3a;
            border-top: none;
        }

        /* ===== PRENDAS PUESTAS (se superponen) ===== */
        .worn-items {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .worn-items .item-slot {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.8rem;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.3s ease;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .worn-items .item-slot.active {
            opacity: 1;
            transform: scale(1);
        }

        .worn-items .item-slot.placed {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0) rotate(-20deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* Posiciones de las prendas */
        .slot-hat {
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4.2rem;
        }
        .slot-mask {
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.4rem;
        }
        .slot-shirt {
            top: 74px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.8rem;
        }
        .slot-scarf {
            top: 128px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.2rem;
        }
        .slot-pants {
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.4rem;
        }
        .slot-boots {
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.0rem;
            letter-spacing: 30px;
        }

        /* ===== MENSAJE DE COMPLETADO ===== */
        .completion-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.82);
            color: #ffd966;
            padding: 20px 40px;
            border-radius: 30px;
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            border: 4px solid #ffd966;
            display: none;
            z-index: 20;
            backdrop-filter: blur(4px);
            animation: celebracion 0.8s ease;
            pointer-events: none;
        }

        .completion-message.show {
            display: block;
            animation: celebracion 0.8s ease;
        }

        @keyframes celebracion {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .completion-message small {
            display: block;
            font-size: 1rem;
            color: #f0d5a8;
            margin-top: 8px;
        }

        /* ===== INVENTARIO DE PRENDAS ===== */
        .inventory {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            background: #5e3d2b;
            padding: 18px 20px;
            border-radius: 60px;
            margin-bottom: 18px;
            border: 4px solid #3f281c;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.4);
            min-height: 90px;
        }

        .inventory .item {
            font-size: 3.2rem;
            background: #f5e6c8;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: grab;
            border: 3px solid #b68b5a;
            box-shadow: 0 4px 0 #7a5a3a, 0 6px 12px rgba(0, 0, 0, 0.3);
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            line-height: 1;
            position: relative;
        }

        .inventory .item:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 0 #7a5a3a, 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .inventory .item:active {
            cursor: grabbing;
            transform: scale(0.92);
            box-shadow: 0 2px 0 #7a5a3a;
        }

        .inventory .item.used {
            opacity: 0.3;
            transform: scale(0.85);
            pointer-events: none;
            filter: grayscale(0.6);
            box-shadow: 0 2px 0 #7a5a3a;
        }

        .inventory .item .label {
            font-size: 0.7rem;
            background: #3f281c;
            color: #f5e6c8;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* ===== BOTONES ===== */
        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .actions button {
            padding: 14px 38px;
            font-size: 1.2rem;
            font-weight: 800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        .actions button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
        }

        .btn-reset {
            background: #d97747;
            color: #fff;
        }
        .btn-reset:hover {
            background: #e68a5a;
        }

        .btn-hint {
            background: #3a6b8f;
            color: #fff;
        }
        .btn-hint:hover {
            background: #4a7f9f;
        }

        .btn-check {
            background: #2d7a4a;
            color: #fff;
        }
        .btn-check:hover {
            background: #3a9a5a;
        }

        /* ===== PISTA ===== */
        .hint-box {
            background: #fef2d6;
            border-left: 8px solid #d97747;
            padding: 14px 20px;
            margin: 18px 0 0;
            border-radius: 20px;
            font-size: 1.1rem;
            color: #3f281c;
            min-height: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .hint-box .hint-icon {
            font-size: 2rem;
        }
        .hint-box .hint-text {
            font-style: italic;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .game-container {
                padding: 16px;
            }
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
                padding: 12px 15px;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .header .stats {
                font-size: 0.95rem;
                gap: 14px;
                padding: 4px 14px;
            }
            .character-area {
                min-height: 260px;
                height: 38vh;
            }
            .body-silhouette {
                transform: scale(0.7);
            }
            .inventory .item {
                font-size: 2.4rem;
                padding: 4px 12px;
            }
            .inventory .item .label {
                font-size: 0.55rem;
                padding: 1px 6px;
            }
            .actions button {
                padding: 10px 20px;
                font-size: 0.95rem;
            }
            .slot-hat {
                font-size: 3.2rem;
            }
            .slot-mask {
                font-size: 2.8rem;
            }
            .slot-shirt {
                font-size: 3.0rem;
            }
            .slot-scarf {
                font-size: 2.6rem;
            }
            .slot-pants {
                font-size: 2.8rem;
            }
            .slot-boots {
                font-size: 2.4rem;
                letter-spacing: 20px;
            }
            .completion-message {
                font-size: 1.4rem;
                padding: 14px 24px;
            }
        }

        @media (max-width: 450px) {
            .body-silhouette {
                transform: scale(0.55);
            }
            .inventory .item {
                font-size: 1.8rem;
                padding: 2px 8px;
            }
            .inventory .item .label {
                display: none;
            }
            .header h1 {
                font-size: 1.0rem;
            }
            .header .stats {
                font-size: 0.75rem;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- ENCABEZADO -->
        <div class="header">
            <h1>🎭 Viste al Güegüense</h1>
            <div class="stats">
                <span>✅ <span id="progressCount">0</span>/6</span>
                <span>💡 <span id="hintCount">3</span></span>
            </div>
        </div>

        <!-- ÁREA DEL PERSONAJE -->
        <div class="character-area" id="characterArea">
            <div class="character-base">
                <div class="body-silhouette">
                    <div class="head"></div>
                    <div class="torso"></div>
                    <div class="legs"><div></div><div></div></div>
                </div>
            </div>

            <!-- Prendas puestas (superpuestas) -->
            <div class="worn-items" id="wornItems">
                <div class="item-slot slot-hat" data-slot="hat">🤠</div>
                <div class="item-slot slot-mask" data-slot="mask">🎭</div>
                <div class="item-slot slot-shirt" data-slot="shirt">👔</div>
                <div class="item-slot slot-scarf" data-slot="scarf">🧣</div>
                <div class="item-slot slot-pants" data-slot="pants">👖</div>
                <div class="item-slot slot-boots" data-slot="boots">👢</div>
            </div>

            <!-- Mensaje de completado -->
            <div class="completion-message" id="completionMessage">
                🎉 ¡Güegüense vestido! 🎉
                <small>¡Has completado el atuendo tradicional!</small>
            </div>
        </div>

        <!-- INVENTARIO -->
        <div class="inventory" id="inventory">
            <div class="item" data-item="hat" draggable="true">
                🤠 <span class="label">Sombrero</span>
            </div>
            <div class="item" data-item="mask" draggable="true">
                🎭 <span class="label">Máscara</span>
            </div>
            <div class="item" data-item="shirt" draggable="true">
                👔 <span class="label">Camisa</span>
            </div>
            <div class="item" data-item="scarf" draggable="true">
                🧣 <span class="label">Pañuelo</span>
            </div>
            <div class="item" data-item="pants" draggable="true">
                👖 <span class="label">Pantalón</span>
            </div>
            <div class="item" data-item="boots" draggable="true">
                👢 <span class="label">Botas</span>
            </div>
        </div>

        <!-- BOTONES -->
        <div class="actions">
            <button class="btn-check" id="checkBtn">✅ Verificar</button>
            <button class="btn-hint" id="hintBtn">💡 Pista</button>
            <button class="btn-reset" id="resetBtn">🔄 Reiniciar</button>
        </div>

        <!-- PISTA -->
        <div class="hint-box" id="hintBox">
            <span class="hint-icon">💬</span>
            <span class="hint-text" id="hintText">Arrastra las prendas al personaje para vestirlo.</span>
        </div>
    </div>

    <script>
        // ============================================================
        //  Viste al Güegüense - Lógica del juego
        // ============================================================

        // --- Estado del juego ---
        const state = {
            // Mapa de qué prenda está puesta en cada slot (null = vacío)
            worn: {
                hat: null,
                mask: null,
                shirt: null,
                scarf: null,
                pants: null,
                boots: null
            },
            // Prendas disponibles (las que aún no se han usado)
            available: ['hat', 'mask', 'shirt', 'scarf', 'pants', 'boots'],
            // Contador de pistas
            hints: 3,
            // Si el juego está completado
            completed: false,
        };

        // --- Mapeo de emojis y nombres ---
        const ITEM_DATA = {
            hat: { emoji: '🤠', label: 'Sombrero' },
            mask: { emoji: '🎭', label: 'Máscara' },
            shirt: { emoji: '👔', label: 'Camisa' },
            scarf: { emoji: '🧣', label: 'Pañuelo' },
            pants: { emoji: '👖', label: 'Pantalón' },
            boots: { emoji: '👢', label: 'Botas' },
        };

        // --- Referencias DOM ---
        const slots = {
            hat: document.querySelector('.slot-hat'),
            mask: document.querySelector('.slot-mask'),
            shirt: document.querySelector('.slot-shirt'),
            scarf: document.querySelector('.slot-scarf'),
            pants: document.querySelector('.slot-pants'),
            boots: document.querySelector('.slot-boots'),
        };

        const inventoryItems = document.querySelectorAll('.inventory .item');
        const progressSpan = document.getElementById('progressCount');
        const hintSpan = document.getElementById('hintCount');
        const hintText = document.getElementById('hintText');
        const completionMsg = document.getElementById('completionMessage');

        const checkBtn = document.getElementById('checkBtn');
        const hintBtn = document.getElementById('hintBtn');
        const resetBtn = document.getElementById('resetBtn');

        // --- Funciones auxiliares ---

        // Actualiza la interfaz según el estado
        function updateUI() {
            // Contar prendas puestas
            let wornCount = 0;
            for (const slot in state.worn) {
                if (state.worn[slot] !== null) wornCount++;
            }
            progressSpan.textContent = wornCount;

            // Actualizar pistas
            hintSpan.textContent = state.hints;

            // Actualizar slots (prendas puestas)
            for (const slot in slots) {
                const itemKey = state.worn[slot];
                const el = slots[slot];
                if (itemKey && ITEM_DATA[itemKey]) {
                    el.textContent = ITEM_DATA[itemKey].emoji;
                    el.classList.add('active');
                    // Si ya estaba puesto, no volver a animar
                } else {
                    el.textContent = '⬜';
                    el.classList.remove('active', 'placed');
                }
            }

            // Actualizar inventario
            inventoryItems.forEach(item => {
                const key = item.dataset.item;
                if (state.available.includes(key)) {
                    item.classList.remove('used');
                    item.draggable = true;
                } else {
                    item.classList.add('used');
                    item.draggable = false;
                }
            });

            // Mostrar/ocultar mensaje de completado
            const allWorn = Object.values(state.worn).every(v => v !== null);
            if (allWorn && !state.completed) {
                state.completed = true;
                completionMsg.classList.add('show');
                // Disparar confeti con emojis
                launchCelebration();
            } else if (!allWorn && state.completed) {
                state.completed = false;
                completionMsg.classList.remove('show');
            }
        }

        // --- Lógica de arrastrar y soltar (Drag & Drop) ---

        // Permitir soltar en el área del personaje
        const characterArea = document.getElementById('characterArea');

        characterArea.addEventListener('dragover', (e) => {
            e.preventDefault(); // Necesario para permitir soltar
        });

        characterArea.addEventListener('drop', (e) => {
            e.preventDefault();
            const itemKey = e.dataTransfer.getData('text/plain');
            if (!itemKey) return;

            // Verificar si la prenda está disponible
            if (!state.available.includes(itemKey)) return;

            // Verificar si ya está puesta (por seguridad)
            for (const slot in state.worn) {
                if (state.worn[slot] === itemKey) return;
            }

            // Determinar el slot correspondiente
            const slotMap = {
                hat: 'hat',
                mask: 'mask',
                shirt: 'shirt',
                scarf: 'scarf',
                pants: 'pants',
                boots: 'boots'
            };
            const targetSlot = slotMap[itemKey];
            if (!targetSlot) return;

            // Si el slot ya tiene una prenda, no se puede sobreescribir
            if (state.worn[targetSlot] !== null) {
                showHint('⚠️ Ese espacio ya está ocupado. Usa "Reiniciar" para empezar de nuevo.');
                return;
            }

            // Colocar la prenda
            state.worn[targetSlot] = itemKey;
            state.available = state.available.filter(k => k !== itemKey);

            // Animar el slot
            const slotEl = slots[targetSlot];
            slotEl.classList.remove('placed');
            // Forzar reflow para reiniciar animación
            void slotEl.offsetWidth;
            slotEl.classList.add('placed');

            // Sonido visual: pestañeo
            slotEl.style.transition = 'none';
            slotEl.style.transform = 'scale(1.3)';
            setTimeout(() => {
                slotEl.style.transform = '';
                slotEl.style.transition = '';
            }, 200);

            updateUI();

            // Mensaje de éxito
            const itemName = ITEM_DATA[itemKey].label;
            showHint(`✅ ¡Bien! Has colocado ${itemName}.`);

            // Verificar si ya se completó (se hace en updateUI)
        });

        // Iniciar arrastre desde el inventario
        inventoryItems.forEach(item => {
            item.addEventListener('dragstart', (e) => {
                const key = item.dataset.item;
                if (!state.available.includes(key)) {
                    e.preventDefault();
                    return;
                }
                e.dataTransfer.setData('text/plain', key);
                e.dataTransfer.effectAllowed = 'copy';
                // Pequeño feedback visual
                item.style.opacity = '0.5';
                setTimeout(() => { item.style.opacity = ''; }, 100);
            });
        });

        // --- Botón Verificar ---
        checkBtn.addEventListener('click', () => {
            const wornCount = Object.values(state.worn).filter(v => v !== null).length;
            if (wornCount === 6) {
                showHint('🎉 ¡Perfecto! El Güegüense está completamente vestido. ¡Felicidades!');
            } else {
                const missing = 6 - wornCount;
                showHint(`🔄 Faltan ${missing} prenda${missing > 1 ? 's' : ''} por colocar. Sigue arrastrando.`);
                // Dar una pista específica de qué falta
                const missingItems = [];
                for (const slot in state.worn) {
                    if (state.worn[slot] === null) {
                        missingItems.push(slot);
                    }
                }
                if (missingItems.length > 0) {
                    const names = missingItems.map(s => {
                        const map = { hat: 'Sombrero', mask: 'Máscara', shirt: 'Camisa', scarf: 'Pañuelo',
                            pants: 'Pantalón', boots: 'Botas' };
                        return map[s] || s;
                    });
                    setTimeout(() => {
                        showHint(`💡 Te faltan: ${names.join(', ')}.`, false);
                    }, 1200);
                }
            }
        });

        // --- Botón Pista ---
        hintBtn.addEventListener('click', () => {
            if (state.hints <= 0) {
                showHint('❌ No te quedan pistas. ¡Reinicia el juego para obtener más!');
                return;
            }

            // Buscar un slot vacío
            const emptySlots = [];
            for (const slot in state.worn) {
                if (state.worn[slot] === null) {
                    emptySlots.push(slot);
                }
            }

            if (emptySlots.length === 0) {
                showHint('🎉 ¡Ya está completo! No necesitas más pistas.');
                return;
            }

            // Elegir un slot vacío al azar
            const randomSlot = emptySlots[Math.floor(Math.random() * emptySlots.length)];
            const map = { hat: 'Sombrero', mask: 'Máscara', shirt: 'Camisa', scarf: 'Pañuelo', pants: 'Pantalón',
                boots: 'Botas' };
            const slotName = map[randomSlot] || randomSlot;

            state.hints--;
            updateUI();
            showHint(`💡 Pista: Prueba a colocar ${slotName}.`);
        });

        // --- Botón Reiniciar ---
        resetBtn.addEventListener('click', () => {
            // Resetear estado
            state.worn = { hat: null, mask: null, shirt: null, scarf: null, pants: null, boots: null };
            state.available = ['hat', 'mask', 'shirt', 'scarf', 'pants', 'boots'];
            state.hints = 3;
            state.completed = false;

            // Resetear UI de slots
            for (const slot in slots) {
                const el = slots[slot];
                el.textContent = '⬜';
                el.classList.remove('active', 'placed');
                el.style.transform = '';
            }

            completionMsg.classList.remove('show');
            updateUI();
            showHint('🔄 Juego reiniciado. ¡Arrastra las prendas al personaje!');
        });

        // --- Mostrar mensaje en el recuadro de pistas ---
        function showHint(message, autoClear = true) {
            hintText.textContent = message;
            if (autoClear) {
                clearTimeout(window.hintTimeout);
                window.hintTimeout = setTimeout(() => {
                    if (!state.completed) {
                        hintText.textContent = 'Arrastra las prendas al personaje para vestirlo.';
                    } else {
                        hintText.textContent = '🎉 ¡El Güegüense está listo!';
                    }
                }, 5000);
            }
        }

        // --- Celebración con emojis (confeti casero) ---
        function launchCelebration() {
            showHint('🎊 ¡Felicidades! Has vestido al Güegüense correctamente.', false);
            // Crear emojis voladores
            const emojis = ['🎉', '🎊', '⭐', '✨', '🌟', '🥳', '🎭', '🇳🇮'];
            const container = document.getElementById('characterArea');
            for (let i = 0; i < 30; i++) {
                const el = document.createElement('div');
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.cssText = `
                            position: absolute;
                            font-size: ${1.5 + Math.random() * 2.5}rem;
                            left: ${Math.random() * 90}%;
                            top: ${-10 + Math.random() * 20}%;
                            pointer-events: none;
                            z-index: 30;
                            animation: fall ${2 + Math.random() * 2}s linear forwards;
                            animation-delay: ${Math.random() * 0.8}s;
                            opacity: 0;
                        `;
                container.appendChild(el);
                setTimeout(() => el.remove(), 4500);
            }
        }

        // --- Inyectar animación de caída para el confeti ---
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
                    @keyframes fall {
                        0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(0.5); }
                        100% { opacity: 0; transform: translateY(400px) rotate(720deg) scale(1.5); }
                    }
                `;
        document.head.appendChild(styleSheet);

        // --- Inicialización ---
        updateUI();
        showHint('🎯 Arrastra cada prenda desde el inventario hacia el personaje.');

        // --- Soporte táctil (para móviles: simplificado con click) ---
        // En móviles, el drag & drop nativo no funciona bien, así que añadimos click para colocar
        inventoryItems.forEach(item => {
            item.addEventListener('click', function(e) {
                // Solo en móviles o si no hay soporte DnD
                if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                    const key = this.dataset.item;
                    if (!state.available.includes(key)) return;

                    // Buscar slot correspondiente
                    const slotMap = { hat: 'hat', mask: 'mask', shirt: 'shirt', scarf: 'scarf', pants: 'pants',
                        boots: 'boots' };
                    const targetSlot = slotMap[key];
                    if (!targetSlot) return;
                    if (state.worn[targetSlot] !== null) {
                        showHint('⚠️ Ese espacio ya está ocupado.');
                        return;
                    }

                    // Colocar
                    state.worn[targetSlot] = key;
                    state.available = state.available.filter(k => k !== key);
                    const slotEl = slots[targetSlot];
                    slotEl.classList.remove('placed');
                    void slotEl.offsetWidth;
                    slotEl.classList.add('placed');
                    updateUI();
                    showHint(`✅ Colocaste ${ITEM_DATA[key].label}.`);
                }
            });
        });

        console.log('🎭 ¡Viste al Güegüense cargado correctamente!');
    </script>
</body>
</html>
