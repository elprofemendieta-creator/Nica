<body>

  <h1>🔤 Ordena la Palabra</h1>

  <p class="subtitle">
    Descubre lugares turísticos de Nicaragua ordenando las letras 🌋🌊
  </p>

  <div class="game-container">

    <h2>Palabra desordenada</h2>

    <div class="scrambled-word" id="scrambledWord">
      Cargando...
    </div>

    <input
      type="text"
      id="userInput"
      class="input-word"
      placeholder="Escribe la respuesta"
    >

    <div class="buttons">

      <button onclick="checkWord()">
        Verificar
      </button>

      <button onclick="showHint()">
        💡 Pista
      </button>

      <button onclick="nextWord()">
        ➡ Siguiente
      </button>

    </div>

    <div class="hint-box" id="hintBox"></div>

    <div class="message" id="message"></div>

    <div class="score" id="score">
      Puntos: 0
    </div>

  </div>

  <a href="juegos.html" class="back-btn">
    ⬅ Volver a Juegos
  </a>

  <script>

    const lugares = [

      {
        palabra:"GRANADA",
        pista:"Ciudad colonial famosa por su arquitectura histórica."
      },

      {
        palabra:"LEON",
        pista:"Ciudad reconocida por su cultura y volcanes."
      },

      {
        palabra:"OMETEPE",
        pista:"Isla formada por dos volcanes en el Lago Cocibolca."
      },

      {
        palabra:"MASAYA",
        pista:"Lugar famoso por su volcán activo y artesanías."
      },

      {
        palabra:"MATAGALPA",
        pista:"Región montañosa conocida por el café."
      },

      {
        palabra:"ESTELI",
        pista:"Ciudad rodeada de naturaleza y paisajes."
      },

      {
        palabra:"BLUEFIELDS",
        pista:"Ciudad caribeña con ambiente tropical."
      },

      {
        palabra:"JINOTEGA",
        pista:"Conocida como la ciudad de las brumas."
      },

      {
        palabra:"CORNISLAND",
        pista:"Destino paradisíaco del Caribe nicaragüense."
      },

      {
        palabra:"SANJUANDELSUR",
        pista:"Destino turístico famoso por playas y surf."
      }

    ];

    let current = 0;
    let points = 0;

    const scrambledWord = document.getElementById("scrambledWord");
    const hintBox = document.getElementById("hintBox");
    const message = document.getElementById("message");
    const score = document.getElementById("score");

    function shuffleWord(word){

      return word
        .split("")
        .sort(() => Math.random() - 0.5)
        .join("");

    }

    function loadWord(){

      const actual = lugares[current];

      scrambledWord.innerText =
        shuffleWord(actual.palabra);

      hintBox.style.display = "none";

      hintBox.innerText = actual.pista;

      message.innerText = "";

      document.getElementById("userInput").value = "";

    }

    function checkWord(){

      const input = document
        .getElementById("userInput")
        .value
        .toUpperCase()
        .replace(/\s/g,'');

      const correct =
        lugares[current].palabra;

      if(input === correct){

        points++;

        score.innerText = `Puntos: ${points}`;

        message.innerHTML =
          "✅ ¡Correcto!";

      }

      else{

        message.innerHTML =
          "❌ Intenta nuevamente";

      }

    }

    function showHint(){

      hintBox.style.display = "block";

    }

    function nextWord(){

      current++;

      if(current >= lugares.length){

        current = 0;

      }

      loadWord();

    }

    loadWord();
// Variable para controlar si ya sumó puntos este juego
let gameCompleted = false;

async function awardPoints(pointsToAdd, gameId) {
  // Verificar si ya se otorgaron puntos antes
  if (gameCompleted) return;

  const user = auth.currentUser;
  if (!user) {
    alert("Debes iniciar sesión para guardar puntos. Ve a la página principal.");
    return;
  }

  // Buscar documento del usuario en Firestore (colección 'usuarios' con campo 'uid')
  const usersRef = collection(db, "usuarios");
  const q = query(usersRef, where("uid", "==", user.uid));
  const querySnapshot = await getDocs(q);
  
  if (querySnapshot.empty) {
    console.error("Usuario no encontrado en Firestore");
    return;
  }

  const userDoc = querySnapshot.docs[0];
  const userDocRef = userDoc.ref;
  const currentPoints = userDoc.data().puntos || 0;

  // Verificar si ya completó este juego antes (colección 'progreso_juegos')
  const progressRef = collection(db, "progreso_juegos");
  const qProgress = query(progressRef, where("usuarioId", "==", user.uid), where("juegoId", "==", gameId));
  const progressSnap = await getDocs(qProgress);
  
  if (!progressSnap.empty) {
    alert("Ya recibiste los puntos por este juego anteriormente.");
    return;
  }

  // Sumar puntos
  const nuevosPuntos = currentPoints + pointsToAdd;
  await updateDoc(userDocRef, { puntos: nuevosPuntos });

  // Registrar progreso
  await addDoc(progressRef, {
    usuarioId: user.uid,
    juegoId: gameId,
    puntosObtenidos: pointsToAdd,
    completado: true,
    fecha: new Date()
  });

  gameCompleted = true;
  alert(`¡Felicidades! Has ganado ${pointsToAdd} puntos. Total: ${nuevosPuntos}`);
}
awardPoints(10, "nombre_unico_del_juego");
// Ejemplo: cuando el usuario completa el juego, llamas a awardPoints(10, "trivia_nicaragua")
  </script>
