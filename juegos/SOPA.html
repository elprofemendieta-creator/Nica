<style>
  /* ===== MEJORAS DE DISEÑO ===== */
  body {
    background: linear-gradient(145deg, #0b1a3a 0%, #0d47a1 50%, #0288d1 100%);
    min-height: 100vh;
    padding: 10px;
  }

  .pcllim {
    max-width: 800px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 32px;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }

  /* ===== BARRA DE NAVEGACIÓN MEJORADA ===== */
  .pclbarra {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 60px;
    padding: 8px 16px;
    margin-bottom: 16px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    flex-wrap: wrap;
    gap: 8px;
  }

  .pclbns, .pclbni {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .pclbot {
    background: rgba(255, 255, 255, 0.1);
    border: none;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }

  .pclbot:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.05);
  }

  .pclbot:active {
    transform: scale(0.92);
  }

  .pclbot.nav {
    background: rgba(255, 215, 0, 0.2);
  }

  .pclbot.nav:hover {
    background: rgba(255, 215, 0, 0.4);
  }

  .pclnum {
    color: #ffd54f;
    font-weight: 700;
    font-size: 1.1rem;
    background: rgba(255, 215, 0, 0.1);
    padding: 4px 16px;
    border-radius: 40px;
    border: 1px solid rgba(255, 215, 0, 0.1);
  }

  /* ===== CONTENEDOR DE JUEGOS ===== */
  .pclcorpo {
    background: rgba(0, 0, 0, 0.1);
    border-radius: 24px;
    padding: 16px;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .pclcont {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  /* ===== ESTILO PARA LA SOPA DE LETRAS ===== */
  [name="limpanel"] {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 16px;
    padding: 12px;
  }

  /* ===== BOTÓN VOLVER ===== */
  .volver {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 12px 24px;
    background: rgba(255, 255, 255, 0.9);
    color: #0d47a1;
    text-decoration: none;
    border-radius: 60px;
    font-weight: 600;
    font-size: clamp(0.85rem, 1.6vw, 1rem);
    transition: all 0.25s ease;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .volver:hover {
    transform: translateY(-3px) scale(1.03);
    background: #ffffff;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
  }

  .volver:active {
    transform: scale(0.96);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 700px) {
    .pcllim {
      padding: 12px;
      border-radius: 24px;
    }

    .pclbarra {
      padding: 6px 12px;
      border-radius: 40px;
      gap: 4px;
    }

    .pclbot {
      width: 34px;
      height: 34px;
      font-size: 1rem;
    }

    .pclnum {
      font-size: 0.9rem;
      padding: 2px 12px;
    }

    .pclcorpo {
      padding: 10px;
      border-radius: 18px;
    }

    .pclcont {
      padding: 10px;
      border-radius: 14px;
    }

    [name="limpanel"] {
      padding: 8px;
    }
  }

  @media (max-width: 480px) {
    .pcllim {
      padding: 8px;
      border-radius: 18px;
    }

    .pclbarra {
      padding: 4px 8px;
      border-radius: 30px;
    }

    .pclbot {
      width: 28px;
      height: 28px;
      font-size: 0.8rem;
    }

    .pclnum {
      font-size: 0.75rem;
      padding: 2px 8px;
    }

    .pclcorpo {
      padding: 6px;
      border-radius: 12px;
    }

    .pclcont {
      padding: 6px;
      border-radius: 10px;
    }

    [name="limpanel"] {
      padding: 4px;
    }

    .volver {
      padding: 8px 16px;
      font-size: 0.75rem;
    }
  }

  /* ===== AJUSTES PARA EL TAMAÑO DE LA SOPA ===== */
  .clim-tam {
    width: 16px;
    height: 16px;
  }

  /* Mejorar legibilidad del texto en la sopa */
  .pclsuper {
    color: #fff;
  }

  .pclsubtx {
    color: #e3f2fd;
  }

  /* Estilo para el panel de la sopa */
  [name="limpanel"] .pclact {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
  }
</style>
</head>
