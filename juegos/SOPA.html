<head>

<title>Sopa de Letras - Nicaragua</title>
<link rel="stylesheet" href="./sclim/lim.css?5.6.4" type="text/css" ></link>
<link rel="stylesheet" href="./sclim/lim-px.css?5.6.4" type="text/css" ></link>
<script src="./sclim/lang.js?5.6.4" type="text/javascript"></script>

<style>
  /* ===== MEJORAS SOLO PARA EL CONTENEDOR PRINCIPAL ===== */
  body {
    background: linear-gradient(145deg, #0b1a3a 0%, #0d47a1 50%, #0288d1 100%);
    min-height: 100vh;
    margin: 0;
    padding: 16px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .pcllim {
    max-width: 850px;
    width: 100%;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 32px;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }

  /* ===== MEJORA DE LA BARRA DE NAVEGACIÓN ===== */
  .pclbarra {
    background: rgba(0, 0, 0, 0.2) !important;
    border-radius: 60px !important;
    padding: 8px 16px !important;
    margin-bottom: 16px !important;
    border: 1px solid rgba(255, 255, 255, 0.06) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    flex-wrap: wrap !important;
    gap: 6px !important;
  }

  .pclbns, .pclbni {
    display: flex !important;
    gap: 4px !important;
    align-items: center !important;
  }

  .pclbot {
    background: rgba(255, 255, 255, 0.08) !important;
    border: none !important;
    color: white !important;
    width: 38px !important;
    height: 38px !important;
    border-radius: 50% !important;
    font-size: 1.1rem !important;
    cursor: pointer !important;
    transition: all 0.2s ease !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
  }

  .pclbot:hover {
    background: rgba(255, 255, 255, 0.2) !important;
    transform: scale(1.05);
  }

  .pclbot.nav {
    background: rgba(255, 215, 0, 0.15) !important;
  }

  .pclbot.nav:hover {
    background: rgba(255, 215, 0, 0.3) !important;
  }

  .pclnum {
    color: #ffd54f !important;
    font-weight: 700 !important;
    font-size: 1rem !important;
    background: rgba(255, 215, 0, 0.1) !important;
    padding: 2px 16px !important;
    border-radius: 40px !important;
    border: 1px solid rgba(255, 215, 0, 0.1) !important;
    min-width: 30px !important;
    text-align: center !important;
  }

  /* ===== MEJORA DEL CONTENEDOR DE JUEGOS ===== */
  .pclcorpo {
    background: rgba(0, 0, 0, 0.08) !important;
    border-radius: 24px !important;
    padding: 16px !important;
    border: 1px solid rgba(255, 255, 255, 0.04) !important;
  }

  .pclcont {
    background: rgba(255, 255, 255, 0.03) !important;
    border-radius: 20px !important;
    padding: 16px !important;
    margin-bottom: 12px !important;
    border: 1px solid rgba(255, 255, 255, 0.04) !important;
  }

  .pclcont:last-child {
    margin-bottom: 0 !important;
  }

  /* ===== MEJORA DEL TEXTO ===== */
  .pclsuper {
    color: #ffffff !important;
    font-weight: 700 !important;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3) !important;
  }

  .pclsubtx {
    color: #e3f2fd !important;
    font-weight: 500 !important;
  }

  /* ===== BOTÓN VOLVER ===== */
  .volver {
    display: inline-flex !important;
    align-items: center !important;
    gap: 8px !important;
    margin-top: 16px !important;
    padding: 10px 24px !important;
    background: rgba(255, 255, 255, 0.9) !important;
    color: #0d47a1 !important;
    text-decoration: none !important;
    border-radius: 60px !important;
    font-weight: 600 !important;
    font-size: 0.95rem !important;
    transition: all 0.25s ease !important;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
  }

  .volver:hover {
    transform: translateY(-2px) !important;
    background: #ffffff !important;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25) !important;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    body {
      padding: 12px;
    }

    .pcllim {
      padding: 14px;
      border-radius: 24px;
    }

    .pclbarra {
      padding: 6px 12px !important;
      border-radius: 40px !important;
    }

    .pclbot {
      width: 32px !important;
      height: 32px !important;
      font-size: 0.9rem !important;
    }

    .pclnum {
      font-size: 0.85rem !important;
      padding: 2px 12px !important;
    }

    .pclcorpo {
      padding: 12px !important;
      border-radius: 18px !important;
    }

    .pclcont {
      padding: 12px !important;
      border-radius: 16px !important;
    }

    .volver {
      padding: 8px 18px !important;
      font-size: 0.85rem !important;
    }
  }

  @media (max-width: 480px) {
    body {
      padding: 8px;
    }

    .pcllim {
      padding: 10px;
      border-radius: 18px;
    }

    .pclbarra {
      padding: 4px 8px !important;
      border-radius: 30px !important;
      gap: 4px !important;
    }

    .pclbot {
      width: 28px !important;
      height: 28px !important;
      font-size: 0.75rem !important;
    }

    .pclnum {
      font-size: 0.7rem !important;
      padding: 2px 8px !important;
      min-width: 24px !important;
    }

    .pclcorpo {
      padding: 8px !important;
      border-radius: 14px !important;
    }

    .pclcont {
      padding: 8px !important;
      border-radius: 12px !important;
    }

    .volver {
      padding: 6px 14px !important;
      font-size: 0.75rem !important;
      margin-top: 12px !important;
    }

    .clim-tam {
      width: 12px !important;
      height: 12px !important;
    }
  }

  /* ===== CORRECCIÓN PARA QUE LOS PANELES SE VEA BIEN ===== */
  [name="limpanel"] {
    background: rgba(255, 255, 255, 0.03) !important;
    border-radius: 12px !important;
    padding: 8px !important;
  }

  /* Asegurar que el texto de la sopa sea visible */
  .pclact {
    color: #ffffff !important;
  }

  /* Mejorar visibilidad de las celdas de la sopa */
  .pclcelda {
    background: rgba(255, 255, 255, 0.08) !important;
    border-radius: 4px !important;
    color: #ffffff !important;
    font-weight: 700 !important;
  }

  .pclcelda:hover {
    background: rgba(255, 255, 255, 0.15) !important;
  }

  /* Ajustar el tamaño de la sopa en móviles */
  @media (max-width: 480px) {
    .pclcelda {
      font-size: 12px !important;
      padding: 2px !important;
    }
  }

  @media (max-width: 380px) {
    .pclcelda {
      font-size: 10px !important;
      padding: 1px !important;
    }
  }
</style>
</head>
