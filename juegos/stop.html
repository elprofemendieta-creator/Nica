<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Stop Pinolero - Guía Pinolera</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stop.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="app-container" id="appRoot">
    <div id="authScreen" class="card" style="text-align:center">
        <h1 style="color:var(--azul-bandera); font-size:2.5rem;">🇳🇮 Stop Pinolero 🎉</h1>
        <p style="font-size:1.2rem">¡El clásico Stop con sabor Nicaragüense! Personaliza tus categorías y compite en línea.</p>
        <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-top:2rem">
            <button id="continueBtn" class="btn btn-primary">🎮 Continuar</button>
        </div>
    </div>

    <div id="mainPanel" style="display:none">
        <div class="user-header" id="userHeader"></div>
        <div class="grid-2">
            <div class="card">
                <h3>📊 Mis Estadísticas</h3>
                <p>🏆 Nivel: <span id="userLevel">Novato</span></p>
                <p>⭐ Puntos: <span id="userPoints">0</span></p>
                <p>🎮 Victorias: <span id="userWins">0</span></p>
            </div>
            <div class="card">
                <div style="display:flex; gap:12px; flex-wrap:wrap">
                    <button id="createRoomBtn" class="btn btn-success">➕ Crear Sala</button>
                    <button id="joinRoomBtn" class="btn">🔗 Unirse a Sala</button>
                    <button id="rankingBtn" class="btn">🏅 Ranking</button>
                    <button id="friendsBtn" class="btn">👥 Amigos</button>
                    <button id="profileBtn" class="btn">👤 Mi Perfil</button>
                    <button id="settingsBtn" class="btn">⚙️ Config</button>
                </div>
            </div>
        </div>
        <div id="dynamicView"></div>
    </div>

    <!-- Modales -->
    <div id="createRoomModal" class="modal"><div class="modal-content">
        <h3>➕ Crear Sala Personalizada</h3>
        <input type="text" id="roomName" placeholder="Nombre de la sala"><br><br>
        <label>👥 Máximo jugadores:</label>
        <select id="maxPlayers"><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select><br><br>
        <label>⏱️ Tiempo por ronda:</label>
        <select id="roundTime"><option value="60">60 segundos</option><option value="90">90 segundos</option><option value="120">120 segundos</option></select><br><br>
        <label>🔄 Número de rondas:</label>
        <select id="numRounds"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select><br><br>
        <label>📋 Estilo de categorías:</label>
        <select id="catStyleSelect">
            <option value="classic">Clásicas (Nombre, Apellidos, Animal, Color, Ciudad/Lugar, Cosa, Fruta/Comida)</option>
            <option value="custom">🎨 Pinoleras Personalizadas (escribe tus 5 categorías)</option>
        </select><br><br>
        <div id="customCategoriesSection" style="display:none;">
            <label>📝 Escribe 5 categorías a buscar:</label>
            <div id="customCategoriesContainer"></div>
        </div>
        <button id="confirmCreateRoom" class="btn btn-success">✅ Crear Sala y obtener enlace</button>
        <button class="closeModal">Cancelar</button>
    </div></div>

    <div id="joinRoomModal" class="modal"><div class="modal-content">
        <h3>🔗 Unirse a Sala</h3>
        <input id="roomCodeInput" placeholder="Código de sala (ej. A3F7K2)"><br><br>
        <button id="confirmJoinRoom" class="btn">Unirse</button>
        <button class="closeModal">Cerrar</button>
    </div></div>

    <footer>
        <p>Código pinolero</p>
        <p>Creado por Juan Mendieta</p>
    </footer>
</div>
<script src="stop.js"></script>
</body>
</html>
