<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🃏 Memoria Turística - Guía Pinolero</title>
  <link rel="stylesheet" href="/juegos/css/pareja.css">
</head>
<body>

  <h1>🃏 Memoria Turística</h1>

  <p class="subtitle">
    Encuentra la pareja correcta entre el lugar turístico y su descripción 🌋🌊
  </p>

  <div class="game-board" id="gameBoard"></div>

  <div class="status" id="status">
    <span>🧩 Encuentra todas las parejas</span>
    <span class="pairs-counter">🏷️ <span id="pairCount">0</span> / <span id="totalPairs">6</span></span>
  </div>

  <a href="juegos.html" class="back-btn">
    ⬅ Volver a Juegos
  </a>

  <!-- Firebase SDK con import map -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>

  <script type="module" src="/juegos/js/pareja.js"></script>

</body>
</html>
