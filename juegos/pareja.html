<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Memoria Turística Nicaragua</title>

  <style>
    /* ===== RESET Y BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0b1a3a 0%, #0d47a1 50%, #0288d1 100%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      padding-top: 24px;
      overflow-x: hidden;
      background-attachment: fixed;
    }

    /* ===== TÍTULOS ===== */
    h1 {
      font-size: clamp(2rem, 7vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      margin-bottom: 4px;
      background: linear-gradient(to right, #ffe082, #fff8e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      text-align: center;
      max-width: 600px;
      opacity: 0.9;
      margin-bottom: 28px;
      font-weight: 300;
      letter-spacing: 0.3px;
      background: rgba(255, 255, 255, 0.08);
      padding: 6px 20px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    /* ===== TABLERO ===== */
    .game-board {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    /* ===== TARJETA ===== */
    .card {
      aspect-ratio: 1 / 1.1;
      perspective: 800px;
      cursor: pointer;
      border-radius: 20px;
      transition: transform 0.15s ease;
    }

    .card:active {
      transform: scale(0.96);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
      border-radius: 20px;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .front,
    .back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 14px;
      font-weight: 600;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      word-break: break-word;
      line-height: 1.4;
    }

    /* --- FRONT (reverso) --- */
    .front {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      color: #ffd54f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-shadow: 0 2px 15px rgba(255, 215, 0, 0.2);
    }

    .front::after {
      content: "🔍";
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      position: absolute;
      bottom: 12px;
      opacity: 0.3;
    }

    /* --- BACK (contenido) --- */
    .back {
      background: linear-gradient(145deg, #ffffff, #f0f4ff);
      color: #0d2b4e;
      transform: rotateY(180deg);
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      padding: 12px 10px;
      border: 2px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
    }

    /* variante para títulos (más énfasis) */
    .back.titulo {
      font-size: clamp(0.9rem, 2.2vw, 1.3rem);
      font-weight: 800;
      background: linear-gradient(145deg, #e3f2fd, #ffffff);
      color: #0d47a1;
      border-color: rgba(13, 71, 161, 0.2);
    }

    /* ===== ESTADO / PUNTUACIÓN ===== */
    .status {
      margin-top: 8px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 28px;
      border-radius: 60px;
      width: 100%;
      max-width: 700px;
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .status .pairs-counter {
      background: rgba(255, 215, 0, 0.2);
      padding: 4px 18px;
      border-radius: 40px;
      font-weight: 600;
      color: #ffd54f;
      font-size: 0.95rem;
    }

    .status .pairs-counter span {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      margin: 0 4px;
    }

    /* ===== BOTÓN VOLVER ===== */
    .back-btn {
      margin-top: 24px;
      margin-bottom: 8px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.88);
      color: #0d47a1;
      padding: 14px 30px;
      border-radius: 60px;
      font-weight: 600;
      transition: all 0.25s ease;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: clamp(0.85rem, 1.6vw, 1rem);
    }

    .back-btn:hover {
      transform: translateY(-3px) scale(1.03);
      background: #ffffff;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
    }

    .back-btn:active {
      transform: scale(0.96);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 700px) {
      .game-board {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .card {
        aspect-ratio: 1 / 1.1;
      }

      .back {
        font-size: clamp(0.65rem, 2vw, 0.85rem);
        padding: 8px 6px;
      }

      .back.titulo {
        font-size: clamp(0.75rem, 2.2vw, 1rem);
      }

      .front {
        font-size: clamp(1.8rem, 6vw, 2.8rem);
      }

      .status {
        padding: 12px 18px;
        border-radius: 40px;
        flex-direction: column;
        gap: 6px;
      }
    }

    @media (max-width: 480px) {
      .game-board {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .card {
        aspect-ratio: 1 / 1.15;
        border-radius: 14px;
      }

      .front,
      .back {
        border-radius: 14px;
        padding: 8px 4px;
      }

      .back {
        font-size: 0.6rem;
        line-height: 1.3;
      }

      .back.titulo {
        font-size: 0.7rem;
      }

      .front {
        font-size: 1.6rem;
      }

      .front::after {
        display: none;
      }

      .status {
        font-size: 0.85rem;
        padding: 10px 14px;
      }
    }

    @media (max-width: 380px) {
      .game-board {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .card {
        aspect-ratio: 1 / 1.2;
      }

      .back {
        font-size: 0.5rem;
        padding: 4px 3px;
        border-radius: 10px;
      }

      .back.titulo {
        font-size: 0.6rem;
      }

      .front {
        font-size: 1.3rem;
      }

      .status {
        font-size: 0.75rem;
        padding: 8px 10px;
      }
    }

    /* ===== ANIMACIONES ===== */
    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .card {
      animation: pop 0.3s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.02s; }
    .card:nth-child(2) { animation-delay: 0.04s; }
    .card:nth-child(3) { animation-delay: 0.06s; }
    .card:nth-child(4) { animation-delay: 0.08s; }
    .card:nth-child(5) { animation-delay: 0.10s; }
    .card:nth-child(6) { animation-delay: 0.12s; }
    .card:nth-child(7) { animation-delay: 0.14s; }
    .card:nth-child(8) { animation-delay: 0.16s; }
    .card:nth-child(9) { animation-delay: 0.18s; }
    .card:nth-child(10) { animation-delay: 0.20s; }
    .card:nth-child(11) { animation-delay: 0.22s; }
    .card:nth-child(12) { animation-delay: 0.24s; }

    /* mensaje de victoria */
    .victory {
      color: #ffd54f;
      font-weight: 700;
      animation: pulse 1s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
      100% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
    }
  </style>

  <!-- ===== FIREBASE (import map) ===== -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>

</head>
<body>

  <h1>🃏 Memoria Turística</h1>

  <p class="subtitle">
    Encuentra la pareja correcta entre el lugar turístico y su descripción 🌋🌊
  </p>

  <div class="game-board" id="gameBoard"></div>

  <div class="status" id="status">
    <span>🧩 Encuentra todas las parejas</span>
    <span class="pairs-counter">🏷️ <span id="pairCount">0</span> / <span id="totalPairs">6</span></span>
  </div>

  <a href="juegos.html" class="back-btn">
    ⬅ Volver a Juegos
  </a>

  <script type="module">
    // ============================================================
    // 1. IMPORTS Y CONFIGURACIÓN DE FIREBASE
    // ============================================================
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged } from "firebase/auth";
    import {
      getFirestore,
      doc,
      getDoc,
      updateDoc,
      collection,
      addDoc,
      query,
      where,
      getDocs
    } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyA6jVICuE17KJcO34gE1brMxqWEfNd3Fy0",
      authDomain: "mapa-41b00.firebaseapp.com",
      projectId: "mapa-41b00",
      storageBucket: "mapa-41b00.firebasestorage.app",
      messagingSenderId: "535032835400",
      appId: "1:535032835400:web:68c079cbc3f419eafd177d",
      measurementId: "G-7R3DSH7PPN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ============================================================
    // 2. DATOS DEL JUEGO
    // ============================================================
    const lugares = [
      { id: 1, titulo: "Granada", descripcion: "Ciudad colonial famosa por su arquitectura histórica." },
      { id: 2, titulo: "Ometepe", descripcion: "Isla formada por dos volcanes en el Lago Cocibolca." },
      { id: 3, titulo: "Corn Island", descripcion: "Playas paradisíacas del Caribe nicaragüense." },
      { id: 4, titulo: "León", descripcion: "Ciudad cultural conocida por volcanes y arte." },
      { id: 5, titulo: "San Juan del Sur", descripcion: "Destino turístico famoso por sus playas y surf." },
      { id: 6, titulo: "Matagalpa", descripcion: "Región montañosa reconocida por su café y clima fresco." }
    ];

    // ============================================================
    // 3. VARIABLES DE ESTADO
    // ============================================================
    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let parejas = 0;
    let gameCompleted = false;
    let currentUser = null;

    const board = document.getElementById("gameBoard");
    const statusEl = document.getElementById("status");
    const pairCountEl = document.getElementById("pairCount");
    const totalPairsEl = document.getElementById("totalPairs");

    totalPairsEl.textContent = lugares.length;

    // ============================================================
    // 4. CONSTRUIR MAZO DE CARTAS
    // ============================================================
    lugares.forEach(lugar => {
      cards.push({ id: lugar.id, text: lugar.titulo, esTitulo: true });
      cards.push({ id: lugar.id, text: lugar.descripcion, esTitulo: false });
    });

    // Barajar
    cards.sort(() => Math.random() - 0.5);

    // ============================================================
    // 5. RENDERIZAR TABLERO
    // ============================================================
    cards.forEach(cardData => {
      const card = document.createElement("div");
      card.classList.add("card");
      card.dataset.id = cardData.id;

      const backClass = cardData.esTitulo ? "back titulo" : "back";

      card.innerHTML = `
        <div class="card-inner">
          <div class="front">❓</div>
          <div class="${backClass}">${cardData.text}</div>
        </div>
      `;

      card.addEventListener("click", () => flipCard(card));
      board.appendChild(card);
    });

    // ============================================================
    // 6. LÓGICA DEL JUEGO
    // ============================================================
    function flipCard(card) {
      if (lockBoard) return;
      if (card === firstCard) return;
      if (card.classList.contains("flipped")) return;

      card.classList.add("flipped");

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      checkMatch();
    }

    function checkMatch() {
      const isMatch = firstCard.dataset.id === secondCard.dataset.id;

      if (isMatch) {
        parejas++;
        pairCountEl.textContent = parejas;
        updateStatusMessage();

        if (parejas === lugares.length) {
          // Victoria
          statusEl.innerHTML = `
            <span class="victory">🎉 ¡Excelente! Encontraste todas las parejas turísticas.</span>
            <span class="pairs-counter">🏆 <span>${parejas}</span> / <span>${lugares.length}</span></span>
          `;
          // Otorgar puntos si el usuario está autenticado
          if (currentUser && !gameCompleted) {
            awardPoints(10, "memoria_turistica_nicaragua");
          }
        }

        resetBoard();
      } else {
        lockBoard = true;
        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          resetBoard();
        }, 1000);
      }
    }

    function resetBoard() {
      [firstCard, secondCard] = [null, null];
      lockBoard = false;
    }

    function updateStatusMessage() {
      const msg = statusEl.querySelector("span:first-child");
      if (msg && !statusEl.querySelector(".victory")) {
        const restante = lugares.length - parejas;
        msg.textContent = restante === 0
          ? "🎉 ¡Completaste todas!"
          : `🧩 Encuentra ${restante} pareja${restante > 1 ? 's' : ''} más`;
      }
    }

    // ============================================================
    // 7. FUNCIÓN PARA OTORGAR PUNTOS (Firestore)
    // ============================================================
    async function awardPoints(pointsToAdd, gameId) {
      if (gameCompleted) return;
      if (!currentUser) {
        console.warn("Usuario no autenticado. Puntos no guardados.");
        return;
      }

      try {
        const usersRef = collection(db, "usuarios");
        const q = query(usersRef, where("uid", "==", currentUser.uid));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          console.error("Usuario no encontrado en Firestore");
          return;
        }

        const userDoc = querySnapshot.docs[0];
        const userDocRef = userDoc.ref;
        const currentPoints = userDoc.data().puntos || 0;

        // Verificar si ya completó este juego antes
        const progressRef = collection(db, "progreso_juegos");
        const qProgress = query(
          progressRef,
          where("usuarioId", "==", currentUser.uid),
          where("juegoId", "==", gameId)
        );
        const progressSnap = await getDocs(qProgress);

        if (!progressSnap.empty) {
          alert("Ya recibiste los puntos por este juego anteriormente.");
          gameCompleted = true;
          return;
        }

        const nuevosPuntos = currentPoints + pointsToAdd;
        await updateDoc(userDocRef, { puntos: nuevosPuntos });

        await addDoc(progressRef, {
          usuarioId: currentUser.uid,
          juegoId: gameId,
          puntosObtenidos: pointsToAdd,
          completado: true,
          fecha: new Date()
        });

        gameCompleted = true;
        alert(`¡Felicidades! Has ganado ${pointsToAdd} puntos. Total: ${nuevosPuntos}`);
      } catch (error) {
        console.error("Error al guardar puntos:", error);
        alert("Ocurrió un error al guardar los puntos. Intenta de nuevo.");
      }
    }

    // ============================================================
    // 8. AUTENTICACIÓN
    // ============================================================
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        console.log("Usuario autenticado:", user.email);
      } else {
        currentUser = null;
        console.log("Usuario no autenticado. Los puntos no se guardarán.");
      }
    });

    // ============================================================
    // 9. REINICIAR JUEGO (opcional: si se pierde, se puede reiniciar)
    //    pero no es necesario para esta versión.
    // ============================================================

    console.log("¡Juego de Memoria Turística cargado correctamente!");
  </script>

</body>
</html>
